
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一頁一題模擬考雛形</title>
<style>
body{font-family:sans-serif;background:#f3f4f6;padding:15px;max-width:700px;margin:auto}
.card{background:white;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.option{display:block;padding:12px;border:1px solid #ddd;border-radius:10px;margin:10px 0;cursor:pointer}
.option:hover{background:#f8fafc}
#feedback{margin-top:15px;padding:12px;border-radius:10px;display:none}
.correct{background:#dcfce7}
.wrong{background:#fee2e2}
button{padding:12px 20px;border:none;border-radius:10px;background:#2563eb;color:white;margin-top:10px}
.progress{margin-bottom:15px;color:#666}
</style>
</head>
<body>
<div class="card">
<div class="progress">第 <span id="qno">1</span> / 2 題</div>
<h3 id="question"></h3>
<div id="options"></div>

<div id="feedback"></div>

<button id="nextBtn" onclick="nextQuestion()" style="display:none">
下一題 →
</button>
</div>

<script>
const questions=[
{
q:"哪一種技術組合最符合輿情分析需求且不涉及個人身份辨識？",
options:[
"情感分析結合關鍵詞提取",
"文本分類結合人臉辨識",
"語音辨識結合影像辨識",
"推薦系統結合社群圖譜分析"
],
answer:0
},
{
q:"對機器學習方式的敘述何者有誤？",
options:["A","B","C","D"],
answer:3
}
];

let current=0;

function renderQuestion(){
const q=questions[current];
document.getElementById("qno").innerText=current+1;
document.getElementById("question").innerText=q.q;

let html="";
q.options.forEach((opt,i)=>{
html+=`<div class="option" onclick="checkAnswer(${i})">
${String.fromCharCode(65+i)}. ${opt}
</div>`;
});
document.getElementById("options").innerHTML=html;

document.getElementById("feedback").style.display="none";
document.getElementById("nextBtn").style.display="none";
}

function checkAnswer(choice){
const q=questions[current];
const feedback=document.getElementById("feedback");

if(choice===q.answer){
feedback.className="correct";
feedback.innerHTML=`✅ 答對！<br>正確答案：${String.fromCharCode(65+q.answer)}`;
}else{
feedback.className="wrong";
feedback.innerHTML=`❌ 答錯！<br>正確答案：${String.fromCharCode(65+q.answer)}`;
}

feedback.style.display="block";

if(current<questions.length-1){
document.getElementById("nextBtn").style.display="inline-block";
}else{
document.getElementById("nextBtn").innerText="測驗完成";
document.getElementById("nextBtn").style.display="inline-block";
}
}

function nextQuestion(){
current++;
if(current<questions.length){
renderQuestion();
}else{
document.querySelector(".card").innerHTML=`
<h2>🎉 測驗完成</h2>
<p>這是手機版一頁一題雛形。</p>
<p>下一版可加入：</p>
<ul>
<li>自動跳下一題</li>
<li>解析區</li>
<li>進度條</li>
<li>錯題本</li>
<li>成績統計</li>
</ul>`;
}
}

renderQuestion();
</script>
</body>
</html>
