<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>115年第二次 AI應用規劃師-初級｜人工智慧基礎概論</title>
<style>
:root { --bg:#f4f6fb; --card:#ffffff; --ink:#182033; --muted:#667085; --brand:#2563eb; --ok:#15803d; --bad:#b91c1c; --line:#e5e7eb; }
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;color:var(--ink);line-height:1.65}
.wrap{max-width:780px;margin:0 auto;padding:18px}
.card{background:var(--card);border-radius:20px;padding:22px;box-shadow:0 8px 26px rgba(16,24,40,.08);}
.title{font-size:24px;font-weight:800;line-height:1.35;margin:0 0 10px}
.subtitle{font-size:18px;font-weight:700;color:#344054;margin:0 0 18px}
.note{color:var(--muted);font-size:14px}
.btn{width:100%;border:0;border-radius:14px;background:var(--brand);color:white;font-weight:800;font-size:17px;padding:14px 18px;margin-top:16px;cursor:pointer}
.btn.secondary{background:#eef2ff;color:#1d4ed8}
.btn:disabled{opacity:.45;cursor:not-allowed}
.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px;color:var(--muted);font-weight:700}
.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:18px}
.bar{height:100%;width:0%;background:var(--brand);transition:.25s}
.qno{display:inline-block;background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:4px 10px;font-size:14px;font-weight:800;margin-bottom:10px}
.question{white-space:pre-wrap;font-size:18px;font-weight:700;margin:0 0 16px}
.option{white-space:pre-wrap;border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin:10px 0;background:#fff;cursor:pointer;font-size:16px}
.option:hover{background:#f9fafb}
.option.selected{border-color:#93c5fd;background:#eff6ff}
.option.correct{border-color:#86efac;background:#dcfce7}
.option.wrong{border-color:#fecaca;background:#fee2e2}
.feedback{display:none;border-radius:14px;padding:13px 14px;margin-top:14px;font-weight:800}
.feedback.ok{display:block;background:#dcfce7;color:var(--ok)}
.feedback.bad{display:block;background:#fee2e2;color:var(--bad)}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.stat{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
.stat b{font-size:24px;display:block}
.review{border-top:1px solid var(--line);padding-top:16px;margin-top:16px}
.wrong-card{border:1px solid var(--line);border-radius:16px;background:#fff;padding:15px;margin:14px 0}
.wrong-card h3{margin:0 0 8px;color:var(--bad)}
.small{font-size:14px;color:var(--muted)}
@media(max-width:520px){.wrap{padding:12px}.card{padding:18px;border-radius:18px}.title{font-size:21px}.subtitle{font-size:16px}.question{font-size:17px}.result-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <section id="home" class="card">
    <h1 class="title">115 年第二次 AI 應用規劃師-初級【公告試題】</h1>
    <p class="subtitle">人工智慧基礎概論(115.05.16)</p>
    <p class="note">共 50 題。每題作答後會立即顯示正確答案，完成後會統計分數、答對、答錯，並列出錯題內容。</p>
    <button class="btn" onclick="startQuiz()">開始測驗</button>
  </section>

  <section id="quiz" class="card" style="display:none">
    <div class="top"><span id="counter"></span><span id="scoreNow"></span></div>
    <div class="progress"><div id="bar" class="bar"></div></div>
    <span id="qno" class="qno"></span>
    <div id="question" class="question"></div>
    <div id="options"></div>
    <div id="feedback" class="feedback"></div>
    <button id="nextBtn" class="btn" onclick="nextQuestion()" disabled>下一題</button>
  </section>

  <section id="result" class="card" style="display:none"></section>
</div>
<script>
const questions = [{"number": 1, "question": "某地方政府委託資料科學團隊，針對選舉期間的社群媒體貼文進行大規模輿情\n分析，目標是了解選民對各政策議題的態度傾向。團隊規劃整合多種AI 技術以\n提升分析涵蓋率。下列哪一種技術組合最符合上述需求，且不涉及對特定個人\n的身份辨識？", "options": [{"label": "A", "text": "(A)情感分析結合關鍵詞提取，分析貼文內容的立場與高頻議題詞彙；"}, {"label": "B", "text": "(B)文本分類結合人臉辨識，辨識發文者身份後再進行政治立場分類；"}, {"label": "C", "text": "(C)語音辨識結合影像辨識，將選舉造勢影片轉換為可分析的文字資料，並進行\n內容整理與主題歸納；"}, {"label": "D", "text": "(D)推薦系統結合社群圖譜分析，針對個別使用者預測其投票選擇"}], "answer": "A", "full": "某地方政府委託資料科學團隊，針對選舉期間的社群媒體貼文進行大規模輿情\n分析，目標是了解選民對各政策議題的態度傾向。團隊規劃整合多種AI 技術以\n提升分析涵蓋率。下列哪一種技術組合最符合上述需求，且不涉及對特定個人\n的身份辨識？\n(A)情感分析結合關鍵詞提取，分析貼文內容的立場與高頻議題詞彙；\n(B)文本分類結合人臉辨識，辨識發文者身份後再進行政治立場分類；\n(C)語音辨識結合影像辨識，將選舉造勢影片轉換為可分析的文字資料，並進行\n內容整理與主題歸納；\n(D)推薦系統結合社群圖譜分析，針對個別使用者預測其投票選擇"}, {"number": 2, "question": "某物流公司正在規劃導入AI 系統以優化多項業務流程，包含異常包裹偵測、路\n線自動規劃與倉儲揀貨效率提升。技術團隊在評估過程中，針對不同任務的資\n料特性與學習目標，討論應採用哪種機器學習方式。請問下列對於各學習方式\n的敘述，何者有誤？", "options": [{"label": "A", "text": "(A)監督式學習（Supervised Learning）適合用於異常包裹偵測，前提是須備有大\n量已標註為正常或異常的歷史資料；"}, {"label": "B", "text": "(B)非監督式學習可（Unsupervised Learning）用於分析倉儲揀貨動線的潛在分\n群，但無法直接預測特定行為的對錯；"}, {"label": "C", "text": "(C)強化學習（Reinforcement Learning）適合應用於路線規劃，模型透過反覆嘗\n試與環境回饋，逐步找出最佳配送策略；"}, {"label": "D", "text": "(D)非監督式學習（Unsupervised Learning）可用於異常包裹偵測，並能在缺乏標\n註資料的情況下，準確判斷每筆資料是否屬於特定異常類別"}], "answer": "D", "full": "某物流公司正在規劃導入AI 系統以優化多項業務流程，包含異常包裹偵測、路\n線自動規劃與倉儲揀貨效率提升。技術團隊在評估過程中，針對不同任務的資\n料特性與學習目標，討論應採用哪種機器學習方式。請問下列對於各學習方式\n的敘述，何者有誤？\n(A)監督式學習（Supervised Learning）適合用於異常包裹偵測，前提是須備有大\n量已標註為正常或異常的歷史資料；\n(B)非監督式學習可（Unsupervised Learning）用於分析倉儲揀貨動線的潛在分\n群，但無法直接預測特定行為的對錯；\n(C)強化學習（Reinforcement Learning）適合應用於路線規劃，模型透過反覆嘗\n試與環境回饋，逐步找出最佳配送策略；\n(D)非監督式學習（Unsupervised Learning）可用於異常包裹偵測，並能在缺乏標\n註資料的情況下，準確判斷每筆資料是否屬於特定異常類別"}, {"number": 3, "question": "某電子製造公司在產線上導入AI 系統，自動判斷電路板是否存在焊接瑕疵，並\n取代人工目視檢查。該系統需處理大量產品外觀影像，並在高產量環境下短時\n間內完成品質判定。下列何者最不符合此應用所展現的AI 核心技術能力？", "options": [{"label": "A", "text": "(A)自然語言處理（Natural Language Processing）；"}, {"label": "B", "text": "(B)電腦視覺（Computer Vision）；"}, {"label": "C", "text": "(C)異常偵測（Anomaly Detection）；"}, {"label": "D", "text": "(D)診斷性分析（Diagnostic Analytics）"}], "answer": "A", "full": "某電子製造公司在產線上導入AI 系統，自動判斷電路板是否存在焊接瑕疵，並\n取代人工目視檢查。該系統需處理大量產品外觀影像，並在高產量環境下短時\n間內完成品質判定。下列何者最不符合此應用所展現的AI 核心技術能力？\n(A)自然語言處理（Natural Language Processing）；\n(B)電腦視覺（Computer Vision）；\n(C)異常偵測（Anomaly Detection）；\n(D)診斷性分析（Diagnostic Analytics）"}, {"number": 4, "question": "某金融科技公司的交易系統，在毫秒等級的時間內持續掃描跨市場價格差異、\n分析大量即時報價，並自動執行交易指令。系統架構師在技術選用評估時，需\n確認該系統於即時交易決策中最核心依賴的AI 能力。下列何者最能正確說明其\n核心AI 能力？", "options": [{"label": "A", "text": "(A)透過自然語言處理技術分析財經新聞語意，作為輔助性市場情緒指標；"}, {"label": "B", "text": "(B)快速分析龐大市場數據並在極短時間內識別交易機會，驅動自動化交易決\n策；"}, {"label": "C", "text": "(C)運用生成對抗網路模擬極端市場情境，預先產出各類黑天鵝事件的應對策\n略；"}, {"label": "D", "text": "(D)透過推薦系統技術，根據投資人歷史交易行為推薦最適合的投資組合標的"}], "answer": "B", "full": "某金融科技公司的交易系統，在毫秒等級的時間內持續掃描跨市場價格差異、\n分析大量即時報價，並自動執行交易指令。系統架構師在技術選用評估時，需\n確認該系統於即時交易決策中最核心依賴的AI 能力。下列何者最能正確說明其\n核心AI 能力？\n(A)透過自然語言處理技術分析財經新聞語意，作為輔助性市場情緒指標；\n(B)快速分析龐大市場數據並在極短時間內識別交易機會，驅動自動化交易決\n策；\n(C)運用生成對抗網路模擬極端市場情境，預先產出各類黑天鵝事件的應對策\n略；\n(D)透過推薦系統技術，根據投資人歷史交易行為推薦最適合的投資組合標的"}, {"number": 5, "question": "某地方政府導入AI 系統審核低收入補助資格。系統已通過內部測試且準確率\n高，但民間團體指出不同族群核准率差異顯著。政府表示該系統由專業廠商開\n發，且未接獲大量申訴。依《人工智慧基本法》精神，下列何者為最適當之優\n先作法？", "options": [{"label": "A", "text": "(A)要求廠商提出無歧視聲明，並持續觀察；"}, {"label": "B", "text": "(B)提升模型整體準確率，以降低錯誤影響；"}, {"label": "C", "text": "(C)進行偏誤影響評估並建立可解釋與申訴機制；"}, {"label": "D", "text": "(D)因尚無大量申訴，暫不調整現行制度"}], "answer": "C", "full": "某地方政府導入AI 系統審核低收入補助資格。系統已通過內部測試且準確率\n高，但民間團體指出不同族群核准率差異顯著。政府表示該系統由專業廠商開\n發，且未接獲大量申訴。依《人工智慧基本法》精神，下列何者為最適當之優\n先作法？\n(A)要求廠商提出無歧視聲明，並持續觀察；\n(B)提升模型整體準確率，以降低錯誤影響；\n(C)進行偏誤影響評估並建立可解釋與申訴機制；\n(D)因尚無大量申訴，暫不調整現行制度"}, {"number": 6, "question": "某AI 新創公司申請AI 系統認證，並聲稱其產品已通過我國「AI 產品與系統評\n測中心」之生成式AI 評測。下列何者不屬於該中心之評測項目？", "options": [{"label": "A", "text": "(A)資安（Secure）；"}, {"label": "B", "text": "(B)公平性（Fair）；"}, {"label": "C", "text": "(C)效率性（Efficiency）；"}, {"label": "D", "text": "(D)可靠性（Reliability）"}], "answer": "C", "full": "某AI 新創公司申請AI 系統認證，並聲稱其產品已通過我國「AI 產品與系統評\n測中心」之生成式AI 評測。下列何者不屬於該中心之評測項目？\n(A)資安（Secure）；\n(B)公平性（Fair）；\n(C)效率性（Efficiency）；\n(D)可靠性（Reliability）"}, {"number": 7, "question": "某媒體集團計畫自行訓練一套生成式AI 系統，用於自動產出新聞摘要與評論內\n容。在專案啟動會議中，法務與技術團隊共同討論如何從訓練階段就降低模型\n產出有害或偏頗內容的風險，並兼顧內容的多元性與公平性。請問下列哪一項\n措施最應該在模型訓練階段優先落實？", "options": [{"label": "A", "text": "(A)確保訓練資料來源多元，並經過嚴格的內容清洗與偏見過濾，以減少模型學\n習到有害或偏頗資訊的風險；"}, {"label": "B", "text": "(B)完全避免使用任何外部文本資料，以降低模型學習到不當內容的可能性；"}, {"label": "C", "text": "(C)僅使用公司內部的新聞稿與公告進行訓練，確保資料來源可控且符合企業立\n場；"}, {"label": "D", "text": "(D)限制模型僅能產出固定格式的內容，從輸出端約束模型避免生成不當資訊"}], "answer": "A", "full": "某媒體集團計畫自行訓練一套生成式AI 系統，用於自動產出新聞摘要與評論內\n容。在專案啟動會議中，法務與技術團隊共同討論如何從訓練階段就降低模型\n產出有害或偏頗內容的風險，並兼顧內容的多元性與公平性。請問下列哪一項\n措施最應該在模型訓練階段優先落實？\n(A)確保訓練資料來源多元，並經過嚴格的內容清洗與偏見過濾，以減少模型學\n習到有害或偏頗資訊的風險；\n(B)完全避免使用任何外部文本資料，以降低模型學習到不當內容的可能性；\n(C)僅使用公司內部的新聞稿與公告進行訓練，確保資料來源可控且符合企業立\n場；\n(D)限制模型僅能產出固定格式的內容，從輸出端約束模型避免生成不當資訊"}, {"number": 8, "question": "某保險公司規劃推出一套AI 核保輔助系統，針對線上投保申請進行初步風險評\n估並自動回覆審核結果。系統開發完成後，依據金融機構運用人工智慧技術作\n業規範，系統在正式與消費者互動前，必須確認相關揭露義務已落實。請問下\n列何者不屬於該規範要求金融機構必要揭露的事項？", "options": [{"label": "A", "text": "(A)詳細公開本系統所採用的機器學習模型架構與完整訓練資料內容；"}, {"label": "B", "text": "(B)說明本服務的適用對象與用途範圍，使消費者了解系統的使用限制與服務邊\n界；"}, {"label": "C", "text": "(C)說明當消費者對AI 核保結果有異議時，是否提供人工複核或申訴管道；"}, {"label": "D", "text": "(D)告知消費者本次核保審查結果係由AI 系統自動完成，非人工逐案審核"}], "answer": "A", "full": "某保險公司規劃推出一套AI 核保輔助系統，針對線上投保申請進行初步風險評\n估並自動回覆審核結果。系統開發完成後，依據金融機構運用人工智慧技術作\n業規範，系統在正式與消費者互動前，必須確認相關揭露義務已落實。請問下\n列何者不屬於該規範要求金融機構必要揭露的事項？\n(A)詳細公開本系統所採用的機器學習模型架構與完整訓練資料內容；\n(B)說明本服務的適用對象與用途範圍，使消費者了解系統的使用限制與服務邊\n界；\n(C)說明當消費者對AI 核保結果有異議時，是否提供人工複核或申訴管道；\n(D)告知消費者本次核保審查結果係由AI 系統自動完成，非人工逐案審核"}, {"number": 9, "question": "某大型醫院導入AI 輔助診斷系統，用於分析病患的電子病歷與影像資料並提供\n疾病風險評分。系統上線後，院方陸續收到三類回饋：①放射科醫師反映無法\n理解系統判斷某病患為高風險的依據與理由；②數位治理委員會發現系統對特\n定族裔病患的誤診率顯著偏高；③資訊安全部門指出部分病患個資在未告知當\n事人的情況下被納入模型再訓練。依據AI 倫理五大核心原則，上述三類問題分\n別對應哪一項原則的違反？", "options": [{"label": "A", "text": "(A)①違反安全性、②違反問責性、③違反透明性；"}, {"label": "B", "text": "(B)①違反隱私性、②違反安全性、③違反公平性；"}, {"label": "C", "text": "(C)①違反公平性、②違反透明性、③違反問責性；"}, {"label": "D", "text": "(D)①違反透明性、②違反公平性、③違反隱私性"}], "answer": "D", "full": "某大型醫院導入AI 輔助診斷系統，用於分析病患的電子病歷與影像資料並提供\n疾病風險評分。系統上線後，院方陸續收到三類回饋：①放射科醫師反映無法\n理解系統判斷某病患為高風險的依據與理由；②數位治理委員會發現系統對特\n定族裔病患的誤診率顯著偏高；③資訊安全部門指出部分病患個資在未告知當\n事人的情況下被納入模型再訓練。依據AI 倫理五大核心原則，上述三類問題分\n別對應哪一項原則的違反？\n(A)①違反安全性、②違反問責性、③違反透明性；\n(B)①違反隱私性、②違反安全性、③違反公平性；\n(C)①違反公平性、②違反透明性、③違反問責性；\n(D)①違反透明性、②違反公平性、③違反隱私性"}, {"number": 10, "question": "某市政府環保局計畫建立空氣品質監測AI 系統，需整合全市5 萬個感測器的即\n時數據（每秒產生大量資料記錄），並持續接收氣象、交通與工廠排放等資料，\n且需即時處理持續產生的資料。就大數據特性分析，下列何者最能說明此專案\n面臨的主要挑戰組合？", "options": [{"label": "A", "text": "(A)Volume 與Velocity，因為資料量龐大且持續高速產生；"}, {"label": "B", "text": "(B)Variety 與Veracity，因為資料來源多元且需確保正確性；"}, {"label": "C", "text": "(C)Velocity 與Value，因為需即時判斷資料是否具有分析價值；"}, {"label": "D", "text": "(D)Volume 與Value，因為需從大量資料中篩選出有用資訊"}], "answer": "A", "full": "某市政府環保局計畫建立空氣品質監測AI 系統，需整合全市5 萬個感測器的即\n時數據（每秒產生大量資料記錄），並持續接收氣象、交通與工廠排放等資料，\n且需即時處理持續產生的資料。就大數據特性分析，下列何者最能說明此專案\n面臨的主要挑戰組合？\n(A)Volume 與Velocity，因為資料量龐大且持續高速產生；\n(B)Variety 與Veracity，因為資料來源多元且需確保正確性；\n(C)Velocity 與Value，因為需即時判斷資料是否具有分析價值；\n(D)Volume 與Value，因為需從大量資料中篩選出有用資訊"}, {"number": 11, "question": "某保險公司建立理賠風險預測模型時，資料科學家在特徵選擇階段提出以「性\n別」作為預測愛滋病毒感染風險的輸入特徵之一。資料治理委員會在審查特徵\n清單時，對此提出異議。下列哪一項理由最能說明「以性別預測愛滋病毒感染\n風險」是不適當的原因？", "options": [{"label": "A", "text": "(A)性別為類別型變數，需進行編碼轉換才能輸入模型，增加前處理複雜度；"}, {"label": "B", "text": "(B)性別特徵在資料集中可能存在缺失值，影響模型訓練的穩定性；"}, {"label": "C", "text": "(C)以性別作為感染風險的代理特徵，會強化對特定族群的歧視性標籤，違反公\n平性原則；"}, {"label": "D", "text": "(D)性別特徵與感染風險之間的統計相關性有限，可能降低模型預測效能"}], "answer": "C", "full": "某保險公司建立理賠風險預測模型時，資料科學家在特徵選擇階段提出以「性\n別」作為預測愛滋病毒感染風險的輸入特徵之一。資料治理委員會在審查特徵\n清單時，對此提出異議。下列哪一項理由最能說明「以性別預測愛滋病毒感染\n風險」是不適當的原因？\n(A)性別為類別型變數，需進行編碼轉換才能輸入模型，增加前處理複雜度；\n(B)性別特徵在資料集中可能存在缺失值，影響模型訓練的穩定性；\n(C)以性別作為感染風險的代理特徵，會強化對特定族群的歧視性標籤，違反公\n平性原則；\n(D)性別特徵與感染風險之間的統計相關性有限，可能降低模型預測效能"}, {"number": 12, "question": "某製造業導入AI 進行生產排程，需整合ERP（企業資源規劃系統）訂單資料、\n設備感測器產生的連續數值紀錄，以及維修技師手寫異常描述（掃描為PDF）。\n資料治理主管需判斷三類資料的型態。下列何者最能正確對應其資料型態？", "options": [{"label": "A", "text": "(A)ERP 訂單資料為半結構化、感測器數值為結構化、維修文字描述為非結構\n化；"}, {"label": "B", "text": "(B)ERP 訂單資料為結構化、感測器數值為結構化、維修文字描述為非結構化；"}, {"label": "C", "text": "(C)ERP 訂單資料為結構化、感測器數值為非結構化、維修文字描述為半結構\n化；"}, {"label": "D", "text": "(D)三者皆屬結構化資料，因為都可以轉換為數值格式後進行分析"}], "answer": "B", "full": "某製造業導入AI 進行生產排程，需整合ERP（企業資源規劃系統）訂單資料、\n設備感測器產生的連續數值紀錄，以及維修技師手寫異常描述（掃描為PDF）。\n資料治理主管需判斷三類資料的型態。下列何者最能正確對應其資料型態？\n(A)ERP 訂單資料為半結構化、感測器數值為結構化、維修文字描述為非結構\n化；\n(B)ERP 訂單資料為結構化、感測器數值為結構化、維修文字描述為非結構化；\n(C)ERP 訂單資料為結構化、感測器數值為非結構化、維修文字描述為半結構\n化；\n(D)三者皆屬結構化資料，因為都可以轉換為數值格式後進行分析"}, {"number": 13, "question": "某銀行建立機器學習模型預測客戶的貸款違約風險。資料集中有一個「職業類\n別」欄位，包含「工程師、教師、業務、自由業」等類別。工程師計劃將此欄\n位進行編碼處理後直接輸入線性模型。下列哪一種編碼方式最可能導致模型錯\n誤解讀類別之間的關係？", "options": [{"label": "A", "text": "(A)One-Hot Encoding；"}, {"label": "B", "text": "(B)Binary Encoding；"}, {"label": "C", "text": "(C)Target Encoding；"}, {"label": "D", "text": "(D)Label Encoding"}], "answer": "D", "full": "某銀行建立機器學習模型預測客戶的貸款違約風險。資料集中有一個「職業類\n別」欄位，包含「工程師、教師、業務、自由業」等類別。工程師計劃將此欄\n位進行編碼處理後直接輸入線性模型。下列哪一種編碼方式最可能導致模型錯\n誤解讀類別之間的關係？\n(A)One-Hot Encoding；\n(B)Binary Encoding；\n(C)Target Encoding；\n(D)Label Encoding"}, {"number": 14, "question": "某能源公司以過去三年每小時用電資料建立需求預測模型，並以5-fold 交叉驗\n證評估，但上線後誤差偏高。技術主管認為問題出在資料分割方式。下列何者\n最能說明使用標準k-fold 交叉驗證的根本問題？", "options": [{"label": "A", "text": "(A)k-fold 交叉驗證需要的計算資源過大，不適合處理三年以上的長期資料；"}, {"label": "B", "text": "(B)k-fold 交叉驗證會隨機分割資料，使訓練集中可能包含比測試集更晚的時間\n點，破壞時間依賴性；"}, {"label": "C", "text": "(C)k-fold 交叉驗證的折數設定過少，應改為10-fold 以提升驗證穩定性；"}, {"label": "D", "text": "(D)k-fold 交叉驗證僅適用於分類問題，不適合電力需求這類連續數值預測任務"}], "answer": "B", "full": "某能源公司以過去三年每小時用電資料建立需求預測模型，並以5-fold 交叉驗\n證評估，但上線後誤差偏高。技術主管認為問題出在資料分割方式。下列何者\n最能說明使用標準k-fold 交叉驗證的根本問題？\n(A)k-fold 交叉驗證需要的計算資源過大，不適合處理三年以上的長期資料；\n(B)k-fold 交叉驗證會隨機分割資料，使訓練集中可能包含比測試集更晚的時間\n點，破壞時間依賴性；\n(C)k-fold 交叉驗證的折數設定過少，應改為10-fold 以提升驗證穩定性；\n(D)k-fold 交叉驗證僅適用於分類問題，不適合電力需求這類連續數值預測任務"}, {"number": 15, "question": "某醫療院所建置病患再住院風險預測模型，特徵包含「年齡」、「體重」、「血壓\n數值」及「診斷類別代碼」等，資料科學家考慮是否需對數值特徵進行標準化\n（Standardization）處理。下列何種模型對特徵尺度最不敏感、最適合在不進行\n標準化的情況下直接使用上述特徵進行訓練？", "options": [{"label": "A", "text": "(A)線性迴歸（Linear Regression）；"}, {"label": "B", "text": "(B)支援向量機（Support Vector Machine）；"}, {"label": "C", "text": "(C)K 近鄰演算法（K-Nearest Neighbors）；"}, {"label": "D", "text": "(D)決策樹（Decision Tree）"}], "answer": "D", "full": "某醫療院所建置病患再住院風險預測模型，特徵包含「年齡」、「體重」、「血壓\n數值」及「診斷類別代碼」等，資料科學家考慮是否需對數值特徵進行標準化\n（Standardization）處理。下列何種模型對特徵尺度最不敏感、最適合在不進行\n標準化的情況下直接使用上述特徵進行訓練？\n(A)線性迴歸（Linear Regression）；\n(B)支援向量機（Support Vector Machine）；\n(C)K 近鄰演算法（K-Nearest Neighbors）；\n(D)決策樹（Decision Tree）"}, {"number": 16, "question": "某企業集團在多個領域導入AI 技術，應用於不同業務場景。請問下列哪一項最\n符合異常檢測（Anomaly Detection）的主要應用目標？", "options": [{"label": "A", "text": "(A)分析客戶的消費行為資料，將客群依偏好進行分群，以制定差異化行銷策\n略；"}, {"label": "B", "text": "(B)根據歷史交易與客戶資料，建立模型預測未來可能發生違約的客戶；"}, {"label": "C", "text": "(C)彙整企業各部門的營運數據，建立儀表板供管理層追蹤關鍵績效指標\n（KPI）的變化；"}, {"label": "D", "text": "(D)從設備感測資料中，即時偵測出與正常運作模式顯著偏離的訊號，以預警可\n能發生的故障"}], "answer": "D", "full": "某企業集團在多個領域導入AI 技術，應用於不同業務場景。請問下列哪一項最\n符合異常檢測（Anomaly Detection）的主要應用目標？\n(A)分析客戶的消費行為資料，將客群依偏好進行分群，以制定差異化行銷策\n略；\n(B)根據歷史交易與客戶資料，建立模型預測未來可能發生違約的客戶；\n(C)彙整企業各部門的營運數據，建立儀表板供管理層追蹤關鍵績效指標\n（KPI）的變化；\n(D)從設備感測資料中，即時偵測出與正常運作模式顯著偏離的訊號，以預警可\n能發生的故障"}, {"number": 17, "question": "某交通局計劃將公車乘客刷卡資料提供給學術機構進行通勤模式研究，該資料\n包含卡號、上下車時間、路線編號等欄位，且需保留跨時間追蹤同一乘客行為\n能力。為保護乘客隱私，下列哪種處理方式最符合個人資料保護法的去識別化\n要求？", "options": [{"label": "A", "text": "(A)將卡號欄位全部刪除，僅保留上下車時間與路線編號；"}, {"label": "B", "text": "(B)對卡號進行MD5 雜湊處理，並保留對照表供查詢；"}, {"label": "C", "text": "(C)將資料彙總為每日各路線總乘客數統計；"}, {"label": "D", "text": "(D)將卡號替換為隨機編號，且不保留任何對應關係"}], "answer": "D", "full": "某交通局計劃將公車乘客刷卡資料提供給學術機構進行通勤模式研究，該資料\n包含卡號、上下車時間、路線編號等欄位，且需保留跨時間追蹤同一乘客行為\n能力。為保護乘客隱私，下列哪種處理方式最符合個人資料保護法的去識別化\n要求？\n(A)將卡號欄位全部刪除，僅保留上下車時間與路線編號；\n(B)對卡號進行MD5 雜湊處理，並保留對照表供查詢；\n(C)將資料彙總為每日各路線總乘客數統計；\n(D)將卡號替換為隨機編號，且不保留任何對應關係"}, {"number": 18, "question": "某工業感測器回傳溫度時序資料，約5%出現遺漏值，確認為短暫失聯所致，非\n設備異常。資料工程師需在不引入虛假異常的前提下進行補值。考量資料具時\n間連續性，下列何種填補方式最為合適？", "options": [{"label": "A", "text": "(A)將遺漏值全數填補為0；"}, {"label": "B", "text": "(B)以前後時間點的觀測值進行線性插補；"}, {"label": "C", "text": "(C)填補整份資料的平均值；"}, {"label": "D", "text": "(D)直接刪除包含遺漏值的時間點"}], "answer": "B", "full": "某工業感測器回傳溫度時序資料，約5%出現遺漏值，確認為短暫失聯所致，非\n設備異常。資料工程師需在不引入虛假異常的前提下進行補值。考量資料具時\n間連續性，下列何種填補方式最為合適？\n(A)將遺漏值全數填補為0；\n(B)以前後時間點的觀測值進行線性插補；\n(C)填補整份資料的平均值；\n(D)直接刪除包含遺漏值的時間點"}, {"number": 19, "question": "某溫室農場開發AI 系統自動識別作物葉片上的害蟲種類，測試結果顯示：在\n1000 張測試影像中，系統正確識別出80 隻害蟲，但誤判了20 張正常葉片為有\n害蟲，同時漏檢了10 隻實際存在的害蟲。對於害蟲檢測這個關鍵任務，下列哪\n個評估指標最需要優先關注？", "options": [{"label": "A", "text": "(A)召回率（Recall）；"}, {"label": "B", "text": "(B)精確率（Precision）；"}, {"label": "C", "text": "(C)準確率（Accuracy）；"}, {"label": "D", "text": "(D)F1 分數（F1-Score）"}], "answer": "A", "full": "某溫室農場開發AI 系統自動識別作物葉片上的害蟲種類，測試結果顯示：在\n1000 張測試影像中，系統正確識別出80 隻害蟲，但誤判了20 張正常葉片為有\n害蟲，同時漏檢了10 隻實際存在的害蟲。對於害蟲檢測這個關鍵任務，下列哪\n個評估指標最需要優先關注？\n(A)召回率（Recall）；\n(B)精確率（Precision）；\n(C)準確率（Accuracy）；\n(D)F1 分數（F1-Score）"}, {"number": 20, "question": "某跨國企業需透過網路將各國子公司之敏感資料傳輸至總部進行模型訓練。資\n訊安全主管要求在傳輸過程中防範中間人攻擊，避免資料遭竊取或竄改。在不\n影響系統跨國即時傳輸效率之前提下，下列哪一項措施最能有效降低此風險？", "options": [{"label": "A", "text": "(A)在接收端加強存取權限與身分驗證，限制只有授權人員可讀取資料；"}, {"label": "B", "text": "(B)在資料傳輸過程中進行加密，並確認雙方身分以確保通訊安全；"}, {"label": "C", "text": "(C)將資料拆分為多個部分分批傳送，降低單次資料外洩風險；"}, {"label": "D", "text": "(D)改用離線備援方式進行跨國資料交換，以降低網路攻擊風險"}], "answer": "B", "full": "某跨國企業需透過網路將各國子公司之敏感資料傳輸至總部進行模型訓練。資\n訊安全主管要求在傳輸過程中防範中間人攻擊，避免資料遭竊取或竄改。在不\n影響系統跨國即時傳輸效率之前提下，下列哪一項措施最能有效降低此風險？\n(A)在接收端加強存取權限與身分驗證，限制只有授權人員可讀取資料；\n(B)在資料傳輸過程中進行加密，並確認雙方身分以確保通訊安全；\n(C)將資料拆分為多個部分分批傳送，降低單次資料外洩風險；\n(D)改用離線備援方式進行跨國資料交換，以降低網路攻擊風險"}, {"number": 21, "question": "關於深度學習（Deep Learning），下列敘述何者最為正確？", "options": [{"label": "A", "text": "(A)深度學習模型通常需要人工設計特徵，以提升模型表現；"}, {"label": "B", "text": "(B)深度學習主要應用於資料壓縮與特徵轉換，較少用於預測任務；"}, {"label": "C", "text": "(C)深度學習透過多層神經網路，能自動從大量資料中學習抽象特徵；"}, {"label": "D", "text": "(D)深度學習模型通常不需要大量資料即可達到良好效果，適合資料量有限的情\n境"}], "answer": "C", "full": "關於深度學習（Deep Learning），下列敘述何者最為正確？\n(A)深度學習模型通常需要人工設計特徵，以提升模型表現；\n(B)深度學習主要應用於資料壓縮與特徵轉換，較少用於預測任務；\n(C)深度學習透過多層神經網路，能自動從大量資料中學習抽象特徵；\n(D)深度學習模型通常不需要大量資料即可達到良好效果，適合資料量有限的情\n境"}, {"number": 22, "question": "某企業於不同業務場景導入AI 應用。下列關於其應用情境與機器學習類型的敘\n述，何者正確？", "options": [{"label": "A", "text": "(A)客服對話分析中，同時使用少量標註資料與大量未標註資料進行訓練，屬於\n監督式學習（Supervised Learning）；"}, {"label": "B", "text": "(B)商品分類系統依據顧客購買行為自動將商品分群，且未使用任何標註資料，\n屬於監督式學習（Supervised Learning）；"}, {"label": "C", "text": "(C)自動駕駛系統根據操作結果的回饋持續調整決策策略，屬於非監督式學習\n（Unsupervised Learning）；"}, {"label": "D", "text": "(D)使用者行為分析中，依據瀏覽與點擊模式將使用者分群，且未使用標註資\n料，屬於非監督式學習（Unsupervised Learning）"}], "answer": "D", "full": "某企業於不同業務場景導入AI 應用。下列關於其應用情境與機器學習類型的敘\n述，何者正確？\n(A)客服對話分析中，同時使用少量標註資料與大量未標註資料進行訓練，屬於\n監督式學習（Supervised Learning）；\n(B)商品分類系統依據顧客購買行為自動將商品分群，且未使用任何標註資料，\n屬於監督式學習（Supervised Learning）；\n(C)自動駕駛系統根據操作結果的回饋持續調整決策策略，屬於非監督式學習\n（Unsupervised Learning）；\n(D)使用者行為分析中，依據瀏覽與點擊模式將使用者分群，且未使用標註資\n料，屬於非監督式學習（Unsupervised Learning）"}, {"number": 23, "question": "某房仲業者委託AI 團隊開發一套房價預測系統，希望根據物件坪數、屋齡、樓\n層與地段等條件，自動估算每間房屋的成交價格，供業務人員作為議價參考依\n據。下列哪一種指標最適合在系統上線前評估模型的預測準確程度？", "options": [{"label": "A", "text": "(A)均方誤差（MSE）；"}, {"label": "B", "text": "(B)精確率（Precision）；"}, {"label": "C", "text": "(C)F1 分數（F1 Score）；"}, {"label": "D", "text": "(D)召回率（Recall）"}], "answer": "A", "full": "某房仲業者委託AI 團隊開發一套房價預測系統，希望根據物件坪數、屋齡、樓\n層與地段等條件，自動估算每間房屋的成交價格，供業務人員作為議價參考依\n據。下列哪一種指標最適合在系統上線前評估模型的預測準確程度？\n(A)均方誤差（MSE）；\n(B)精確率（Precision）；\n(C)F1 分數（F1 Score）；\n(D)召回率（Recall）"}, {"number": 24, "question": "某電商平台導入強化學習（Reinforcement Learning）技術優化商品推薦策略，AI\n代理（AI Agent）會根據使用者的點擊與購買行為持續調整推薦內容。技術團隊\n在討論中發現，系統面臨一個核心挑戰：若AI Agent 總是推薦過去表現良好的\n商品，可能會錯失發掘更高潛力商品的機會；但若頻繁嘗試未知商品，又可能\n影響短期的推薦成效與使用者體驗。請問上述情境敘述的是強化學習中哪一個\n核心問題？", "options": [{"label": "A", "text": "(A)探索與利用的權衡（Exploration vs. Exploitation）；"}, {"label": "B", "text": "(B)偏差與變異的權衡（Bias vs. Variance）；"}, {"label": "C", "text": "(C)梯度爆炸與消失（Vanishing and Exploding Gradients）；"}, {"label": "D", "text": "(D)過擬合與欠擬合（Overfitting and Underfitting）"}], "answer": "A", "full": "某電商平台導入強化學習（Reinforcement Learning）技術優化商品推薦策略，AI\n代理（AI Agent）會根據使用者的點擊與購買行為持續調整推薦內容。技術團隊\n在討論中發現，系統面臨一個核心挑戰：若AI Agent 總是推薦過去表現良好的\n商品，可能會錯失發掘更高潛力商品的機會；但若頻繁嘗試未知商品，又可能\n影響短期的推薦成效與使用者體驗。請問上述情境敘述的是強化學習中哪一個\n核心問題？\n(A)探索與利用的權衡（Exploration vs. Exploitation）；\n(B)偏差與變異的權衡（Bias vs. Variance）；\n(C)梯度爆炸與消失（Vanishing and Exploding Gradients）；\n(D)過擬合與欠擬合（Overfitting and Underfitting）"}, {"number": 25, "question": "某語音辨識系統需分析長時間的語音序列，發現當句子較長時，模型難以保留\n長時間序列中的前段資訊，導致辨識準確度下降。為改善此問題，下列何種模\n型最適合？", "options": [{"label": "A", "text": "(A)長短期記憶網路（LSTM）；"}, {"label": "B", "text": "(B)循環神經網路（RNN）；"}, {"label": "C", "text": "(C)卷積神經網路（CNN）；"}, {"label": "D", "text": "(D)生成式對抗網路（GAN）"}], "answer": "A", "full": "某語音辨識系統需分析長時間的語音序列，發現當句子較長時，模型難以保留\n長時間序列中的前段資訊，導致辨識準確度下降。為改善此問題，下列何種模\n型最適合？\n(A)長短期記憶網路（LSTM）；\n(B)循環神經網路（RNN）；\n(C)卷積神經網路（CNN）；\n(D)生成式對抗網路（GAN）"}, {"number": 26, "question": "某大型連鎖超市建置生鮮商品損耗預測模型，以減少報廢損失。資料庫中共有\n120 萬筆銷售紀錄，但僅有約8 萬筆資料標記為「正常銷售」或「損耗發生」，\n其餘資料均未標註。在標註資源有限的情況下，團隊希望提升模型預測表現。\n請問下列哪一種機器學習方式最適合此情境？", "options": [{"label": "A", "text": "(A)監督式學習（Supervised Learning），以8 萬筆已標註資料訓練分類模型，捨\n棄其餘112 萬筆無標註資料；"}, {"label": "B", "text": "(B)半監督式學習（Semi-supervised Learning），同時利用少量已標註資料學習分\n類邊界，並從大量無標註資料中學習資料整體分布特性；"}, {"label": "C", "text": "(C)非監督式學習（Unsupervised Learning），對全部120 萬筆資料進行自動分\n群，再由專家事後人工確認各群所代表的損耗類型；"}, {"label": "D", "text": "(D)強化學習（Reinforcement Learning），讓模型在每次預測後依據實際損耗結果\n作為回饋訊號，持續調整損耗預警策略"}], "answer": "B", "full": "某大型連鎖超市建置生鮮商品損耗預測模型，以減少報廢損失。資料庫中共有\n120 萬筆銷售紀錄，但僅有約8 萬筆資料標記為「正常銷售」或「損耗發生」，\n其餘資料均未標註。在標註資源有限的情況下，團隊希望提升模型預測表現。\n請問下列哪一種機器學習方式最適合此情境？\n(A)監督式學習（Supervised Learning），以8 萬筆已標註資料訓練分類模型，捨\n棄其餘112 萬筆無標註資料；\n(B)半監督式學習（Semi-supervised Learning），同時利用少量已標註資料學習分\n類邊界，並從大量無標註資料中學習資料整體分布特性；\n(C)非監督式學習（Unsupervised Learning），對全部120 萬筆資料進行自動分\n群，再由專家事後人工確認各群所代表的損耗類型；\n(D)強化學習（Reinforcement Learning），讓模型在每次預測後依據實際損耗結果\n作為回饋訊號，持續調整損耗預警策略"}, {"number": 27, "question": "某製造業評估在不同場景導入AI，包含：\n（甲）依據設備感測器數值判斷是否出現異常；\n（乙）依據客服對話內容判斷客戶情緒；\n（丙）依據產品影像輪廓直接進行瑕疵分類。\n下列哪一種情境最適合以自編碼器（Autoencoder）作為主要模型架構？", "options": [{"label": "A", "text": "(A)甲；"}, {"label": "B", "text": "(B)乙；"}, {"label": "C", "text": "(C)丙；"}, {"label": "D", "text": "(D)甲與丙"}], "answer": "A", "full": "某製造業評估在不同場景導入AI，包含：\n（甲）依據設備感測器數值判斷是否出現異常；\n（乙）依據客服對話內容判斷客戶情緒；\n（丙）依據產品影像輪廓直接進行瑕疵分類。\n下列哪一種情境最適合以自編碼器（Autoencoder）作為主要模型架構？\n(A)甲；\n(B)乙；\n(C)丙；\n(D)甲與丙"}, {"number": 28, "question": "某AI 團隊正在訓練一個深度神經網路，用於辨識工廠產線上的瑕疵零件。工程\n師發現訓練過程中損失函數震盪幅度大，且不同批次資料造成模型學習方向不\n穩定。為改善此問題，團隊在各隱藏層加入Batch Normalization 機制。請問此\n調整在訓練階段最主要的作用為何？", "options": [{"label": "A", "text": "(A)將輸入影像標準化，使不同類別的特徵分布更加一致；"}, {"label": "B", "text": "(B)自動調整模型權重初始化方式，以避免訓練初期震盪；"}, {"label": "C", "text": "(C)增加模型隱藏層的非線性能力，以提升分類精度上限；"}, {"label": "D", "text": "(D)降低不同批次輸入造成的內部特徵分布變動，使梯度更新更穩定"}], "answer": "D", "full": "某AI 團隊正在訓練一個深度神經網路，用於辨識工廠產線上的瑕疵零件。工程\n師發現訓練過程中損失函數震盪幅度大，且不同批次資料造成模型學習方向不\n穩定。為改善此問題，團隊在各隱藏層加入Batch Normalization 機制。請問此\n調整在訓練階段最主要的作用為何？\n(A)將輸入影像標準化，使不同類別的特徵分布更加一致；\n(B)自動調整模型權重初始化方式，以避免訓練初期震盪；\n(C)增加模型隱藏層的非線性能力，以提升分類精度上限；\n(D)降低不同批次輸入造成的內部特徵分布變動，使梯度更新更穩定"}, {"number": 29, "question": "某AI 研究團隊採用GRPO（Group Relative Policy Optimization）作為一種基於\n強化學習的模型優化方法，用於提升大型語言模型的表現。請問GRPO 最適合\n用來強化模型在哪一類任務上的表現？", "options": [{"label": "A", "text": "(A)判斷客服留言的情緒傾向，將每則訊息快速歸類為正面、負面或中性；"}, {"label": "B", "text": "(B)將客服電話錄音即時轉換為文字，供後續人工審閱使用；"}, {"label": "C", "text": "(C)針對數學應用題或邏輯謎題，逐步推導出正確解答；"}, {"label": "D", "text": "(D)分析商品圖片的外觀特徵，自動辨識類別與品項"}], "answer": "C", "full": "某AI 研究團隊採用GRPO（Group Relative Policy Optimization）作為一種基於\n強化學習的模型優化方法，用於提升大型語言模型的表現。請問GRPO 最適合\n用來強化模型在哪一類任務上的表現？\n(A)判斷客服留言的情緒傾向，將每則訊息快速歸類為正面、負面或中性；\n(B)將客服電話錄音即時轉換為文字，供後續人工審閱使用；\n(C)針對數學應用題或邏輯謎題，逐步推導出正確解答；\n(D)分析商品圖片的外觀特徵，自動辨識類別與品項"}, {"number": 30, "question": "某法律科技公司開發一套合約風險審查系統，可自動分析合約內容並標示潛在\n的高風險條款。律師在使用過程中，希望了解模型做出風險判斷的依據，因此\n系統導入顯著性圖（Saliency Map）作為可解釋 AI 的方法。請問在此自然語言\n處理（Natural Language Processing, NLP）應用情境中，顯著性圖主要用來標示\n什麼？", "options": [{"label": "A", "text": "(A)合約中各段落之間的語意相似程度，協助辨識重複或可能矛盾的條款；"}, {"label": "B", "text": "(B)模型在進行預測時，輸入文字中對結果影響程度較高的文字片段；"}, {"label": "C", "text": "(C)不同版本合約之間的文字差異，用以標示新增或修改的條款位置；"}, {"label": "D", "text": "(D)模型在訓練資料中學習到的高頻詞彙，反映常見的風險相關用語"}], "answer": "B", "full": "某法律科技公司開發一套合約風險審查系統，可自動分析合約內容並標示潛在\n的高風險條款。律師在使用過程中，希望了解模型做出風險判斷的依據，因此\n系統導入顯著性圖（Saliency Map）作為可解釋 AI 的方法。請問在此自然語言\n處理（Natural Language Processing, NLP）應用情境中，顯著性圖主要用來標示\n什麼？\n(A)合約中各段落之間的語意相似程度，協助辨識重複或可能矛盾的條款；\n(B)模型在進行預測時，輸入文字中對結果影響程度較高的文字片段；\n(C)不同版本合約之間的文字差異，用以標示新增或修改的條款位置；\n(D)模型在訓練資料中學習到的高頻詞彙，反映常見的風險相關用語"}, {"number": 31, "question": "某製造業AI 品質預測模型採用部分依賴圖（Partial Dependence Plots, PDP）分\n析特徵影響效果。資料科學家希望了解「溫度特徵」對良品率的整體影響趨\n勢，但主管進一步詢問，是否能用PDP 判斷某一筆瑕疵產品批次資料中，溫度\n是否為主要原因。下列何者最能說明PDP 在此情境中的限制？", "options": [{"label": "A", "text": "(A)PDP 無法顯示模型的預測準確率；"}, {"label": "B", "text": "(B)PDP 僅能反映模型輸出結果，無法提供任何特徵影響的資訊；"}, {"label": "C", "text": "(C)PDP 僅能用於單一特徵分析，無法同時考慮多個特徵的影響；"}, {"label": "D", "text": "(D)PDP 僅呈現整體趨勢，無法判斷單一批次的原因"}], "answer": "D", "full": "某製造業AI 品質預測模型採用部分依賴圖（Partial Dependence Plots, PDP）分\n析特徵影響效果。資料科學家希望了解「溫度特徵」對良品率的整體影響趨\n勢，但主管進一步詢問，是否能用PDP 判斷某一筆瑕疵產品批次資料中，溫度\n是否為主要原因。下列何者最能說明PDP 在此情境中的限制？\n(A)PDP 無法顯示模型的預測準確率；\n(B)PDP 僅能反映模型輸出結果，無法提供任何特徵影響的資訊；\n(C)PDP 僅能用於單一特徵分析，無法同時考慮多個特徵的影響；\n(D)PDP 僅呈現整體趨勢，無法判斷單一批次的原因"}, {"number": 32, "question": "某銀行使用LIME（Local Interpretable Model-agnostic Explanations）來解釋其信\n貸審核模型的決策結果。分析師在閱讀解釋報告時，看到系統建立了一個簡化\n模型來近似原模型在該筆資料附近的行為。下列何者最能說明LIME 中代理模\n型（Surrogate model）的意義？", "options": [{"label": "A", "text": "(A)一個全局解釋所有預測的線性代理模型；"}, {"label": "B", "text": "(B)用於產生擾動資料的資料生成機制；"}, {"label": "C", "text": "(C)一種獨立訓練的生成式模型，用於輔助預測；"}, {"label": "D", "text": "(D)用於擬合原黑箱模型在目標實例附近的預測行為"}], "answer": "D", "full": "某銀行使用LIME（Local Interpretable Model-agnostic Explanations）來解釋其信\n貸審核模型的決策結果。分析師在閱讀解釋報告時，看到系統建立了一個簡化\n模型來近似原模型在該筆資料附近的行為。下列何者最能說明LIME 中代理模\n型（Surrogate model）的意義？\n(A)一個全局解釋所有預測的線性代理模型；\n(B)用於產生擾動資料的資料生成機制；\n(C)一種獨立訓練的生成式模型，用於輔助預測；\n(D)用於擬合原黑箱模型在目標實例附近的預測行為"}, {"number": 33, "question": "小明在2025 年使用AI 模型，將自己的照片轉換為公仔風格影像。該模型在維\n持生成品質的同時，也能在模型規模較大的情況下兼顧運算效率。下列何者最\n能敘述此模型可能採用的設計方式？", "options": [{"label": "A", "text": "(A)基於單一稠密Transformer 架構，每次運算都使用全部模型參數；"}, {"label": "B", "text": "(B)採用稀疏專家混合（Sparse Mixture-of-Experts）架構，每次僅使用部分模型\n來提升效率；"}, {"label": "C", "text": "(C)採用生成對抗網路（GAN），透過兩個模型互相比較來提升影像品質；"}, {"label": "D", "text": "(D)採用卷積神經網路（CNN），直接進行影像轉換"}], "answer": "B", "full": "小明在2025 年使用AI 模型，將自己的照片轉換為公仔風格影像。該模型在維\n持生成品質的同時，也能在模型規模較大的情況下兼顧運算效率。下列何者最\n能敘述此模型可能採用的設計方式？\n(A)基於單一稠密Transformer 架構，每次運算都使用全部模型參數；\n(B)採用稀疏專家混合（Sparse Mixture-of-Experts）架構，每次僅使用部分模型\n來提升效率；\n(C)採用生成對抗網路（GAN），透過兩個模型互相比較來提升影像品質；\n(D)採用卷積神經網路（CNN），直接進行影像轉換"}, {"number": 34, "question": "CLIP 與DINO 皆屬於自監督學習（Self-supervised Learning）模型，但其訓練資\n料來源有所不同。下列何者最能正確敘述兩者在訓練資料型態上的差異？", "options": [{"label": "A", "text": "(A)皆使用有標註圖像資料進行監督式學習；"}, {"label": "B", "text": "(B)皆使用未標註圖像資料進行自監督學習；"}, {"label": "C", "text": "(C)CLIP 使用圖像與文字配對資料，DINO 使用未標註圖像資料；"}, {"label": "D", "text": "(D)CLIP 使用未標註圖像資料，DINO 使用圖像與文字配對資料"}], "answer": "C", "full": "CLIP 與DINO 皆屬於自監督學習（Self-supervised Learning）模型，但其訓練資\n料來源有所不同。下列何者最能正確敘述兩者在訓練資料型態上的差異？\n(A)皆使用有標註圖像資料進行監督式學習；\n(B)皆使用未標註圖像資料進行自監督學習；\n(C)CLIP 使用圖像與文字配對資料，DINO 使用未標註圖像資料；\n(D)CLIP 使用未標註圖像資料，DINO 使用圖像與文字配對資料"}, {"number": 35, "question": "某企業導入大型語言模型（LLM）進行長篇法規文件的問答查詢。使用者反\n映，當問題需整合文件中較不相關的資訊時，模型回答的連貫性與準確性明顯\n下降。技術團隊認為此現象與模型架構特性有關。下列何者最能說明傳統\nTransformer 在此情境下的限制？", "options": [{"label": "A", "text": "(A)模型在推理時僅能依賴固定長度的上下文窗口，無法同時處理分散於全文的\n資訊；"}, {"label": "B", "text": "(B)模型能記住的內容取決於訓練語料，推理時遇到新內容可能無法應對；"}, {"label": "C", "text": "(C)Transformer 在長序列處理時效率下降，但仍可完整處理所有輸入內容；"}, {"label": "D", "text": "(D)每次推理後 Transformer 都需重新訓練才能記住新的資訊"}], "answer": "A", "full": "某企業導入大型語言模型（LLM）進行長篇法規文件的問答查詢。使用者反\n映，當問題需整合文件中較不相關的資訊時，模型回答的連貫性與準確性明顯\n下降。技術團隊認為此現象與模型架構特性有關。下列何者最能說明傳統\nTransformer 在此情境下的限制？\n(A)模型在推理時僅能依賴固定長度的上下文窗口，無法同時處理分散於全文的\n資訊；\n(B)模型能記住的內容取決於訓練語料，推理時遇到新內容可能無法應對；\n(C)Transformer 在長序列處理時效率下降，但仍可完整處理所有輸入內容；\n(D)每次推理後 Transformer 都需重新訓練才能記住新的資訊"}, {"number": 36, "question": "小明剛加入一間電商公司擔任 AI 專案的業務窗口，在與技術團隊的交接會議\n中，工程師說明模型訓練時，會持續比對預測值與實際值之間的差距，並透過\n一套機制逐步調整模型內部參數，直到預測結果趨於穩定為止。請問工程師敘\n述的是深度學習中哪個元件的功能？", "options": [{"label": "A", "text": "(A)優化器（Optimizer）；"}, {"label": "B", "text": "(B)資料前處理模組；"}, {"label": "C", "text": "(C)模型架構；"}, {"label": "D", "text": "(D)激活函數（Activation Function）"}], "answer": "A", "full": "小明剛加入一間電商公司擔任 AI 專案的業務窗口，在與技術團隊的交接會議\n中，工程師說明模型訓練時，會持續比對預測值與實際值之間的差距，並透過\n一套機制逐步調整模型內部參數，直到預測結果趨於穩定為止。請問工程師敘\n述的是深度學習中哪個元件的功能？\n(A)優化器（Optimizer）；\n(B)資料前處理模組；\n(C)模型架構；\n(D)激活函數（Activation Function）"}, {"number": 37, "question": "某醫療AI 系統使用深度學習模型分析胸腔X 光影像，判斷患者是否罹患肺炎。\n醫院評估委員會要求系統必須能夠標示「影像中哪些區域對本次診斷判斷影響\n最大」，以供放射科醫師進行審核確認。 下列哪一種可解釋AI 技術最能直接滿\n足「標示影像中對預測結果影響最大的區域」此一需求？", "options": [{"label": "A", "text": "(A)LIME（Local Interpretable Model-agnostic Explanations）；"}, {"label": "B", "text": "(B)SHAP（SHapley Additive exPlanations）；"}, {"label": "C", "text": "(C)部分依賴圖（Partial Dependence Plot, PDP）；"}, {"label": "D", "text": "(D)顯著性圖（Saliency Map）"}], "answer": "D", "full": "某醫療AI 系統使用深度學習模型分析胸腔X 光影像，判斷患者是否罹患肺炎。\n醫院評估委員會要求系統必須能夠標示「影像中哪些區域對本次診斷判斷影響\n最大」，以供放射科醫師進行審核確認。 下列哪一種可解釋AI 技術最能直接滿\n足「標示影像中對預測結果影響最大的區域」此一需求？\n(A)LIME（Local Interpretable Model-agnostic Explanations）；\n(B)SHAP（SHapley Additive exPlanations）；\n(C)部分依賴圖（Partial Dependence Plot, PDP）；\n(D)顯著性圖（Saliency Map）"}, {"number": 38, "question": "某電商平台希望偵測異常評論行為，例如大量重複貼文或疑似機器人生成的評\n論。由於此類異常樣本難以事先完整標記，系統主要依據大量正常評論的分布\n來識別偏離行為。下列哪一種機器學習框架最能滿足此系統的設計需求？", "options": [{"label": "A", "text": "(A)非監督式學習（Unsupervised Learning）的關聯規則挖掘，從評論中找出常見\n字詞組合；"}, {"label": "B", "text": "(B)監督式學習（Supervised Learning）的二元分類，從已標記資料學習分類模\n型；"}, {"label": "C", "text": "(C)半監督式學習（Semi-supervised Learning）的異常偵測，辨識偏離正常分布的\n評論行為；"}, {"label": "D", "text": "(D)強化學習（Reinforcement Learning），透過回饋機制優化評論判斷策略"}], "answer": "C", "full": "某電商平台希望偵測異常評論行為，例如大量重複貼文或疑似機器人生成的評\n論。由於此類異常樣本難以事先完整標記，系統主要依據大量正常評論的分布\n來識別偏離行為。下列哪一種機器學習框架最能滿足此系統的設計需求？\n(A)非監督式學習（Unsupervised Learning）的關聯規則挖掘，從評論中找出常見\n字詞組合；\n(B)監督式學習（Supervised Learning）的二元分類，從已標記資料學習分類模\n型；\n(C)半監督式學習（Semi-supervised Learning）的異常偵測，辨識偏離正常分布的\n評論行為；\n(D)強化學習（Reinforcement Learning），透過回饋機制優化評論判斷策略"}, {"number": 39, "question": "在命名實體辨識（Named Entity Recognition, NER）任務中，模型需根據整句文\n字判斷每個詞的標籤，並考慮詞與詞之間的關聯性。若採用 Conditional\nRandom Field（CRF）作為模型，下列何者最能描述其模型類型？", "options": [{"label": "A", "text": "(A)生成式模型（Generative Model）；"}, {"label": "B", "text": "(B)無監督模型（Unsupervised Model）；"}, {"label": "C", "text": "(C)鑑別式模型（Discriminative Model）；"}, {"label": "D", "text": "(D)自迴歸模型（Autoregressive Model）"}], "answer": "C", "full": "在命名實體辨識（Named Entity Recognition, NER）任務中，模型需根據整句文\n字判斷每個詞的標籤，並考慮詞與詞之間的關聯性。若採用 Conditional\nRandom Field（CRF）作為模型，下列何者最能描述其模型類型？\n(A)生成式模型（Generative Model）；\n(B)無監督模型（Unsupervised Model）；\n(C)鑑別式模型（Discriminative Model）；\n(D)自迴歸模型（Autoregressive Model）"}, {"number": 40, "question": "某音樂串流平台希望開發一套AI 系統，能根據平台上累積的大量歌曲資料，自\n動生成具有不同風格變化的全新旋律，供創作者作為靈感參考。平台技術長在\n評估方案時強調，系統不能只是播放或拼接既有歌曲片段，也不能僅進行資料\n的重建，而是要真正學習音樂的結構與風格，並創作出從未出現過的新旋律。\n請問下列哪一種模型技術最符合此需求？", "options": [{"label": "A", "text": "(A)K-近鄰演算法（K-Nearest Neighbors, KNN）；"}, {"label": "B", "text": "(B)自編碼器（Autoencoder）；"}, {"label": "C", "text": "(C)生成對抗網路（GAN）；"}, {"label": "D", "text": "(D)隨機森林（Random Forest）"}], "answer": "C", "full": "某音樂串流平台希望開發一套AI 系統，能根據平台上累積的大量歌曲資料，自\n動生成具有不同風格變化的全新旋律，供創作者作為靈感參考。平台技術長在\n評估方案時強調，系統不能只是播放或拼接既有歌曲片段，也不能僅進行資料\n的重建，而是要真正學習音樂的結構與風格，並創作出從未出現過的新旋律。\n請問下列哪一種模型技術最符合此需求？\n(A)K-近鄰演算法（K-Nearest Neighbors, KNN）；\n(B)自編碼器（Autoencoder）；\n(C)生成對抗網路（GAN）；\n(D)隨機森林（Random Forest）"}, {"number": 41, "question": "某資安公司正在評估導入機器學習模型來偵測網路流量中的異常連線行為。技\n術團隊在比較各種演算法時，其中一位工程師建議採用支援向量機（SVM）。請\n問下列何者最正確敘述支援向量機的特性？", "options": [{"label": "A", "text": "(A)擅長處理大規模非結構化資料，且模型訓練完成後可自動適應新進資料而無\n需重新建模；"}, {"label": "B", "text": "(B)透過多個模型的集體決策來提升預測穩定性，在資料量不足時仍能維持一定\n的準確率；"}, {"label": "C", "text": "(C)在高維度且樣本數相對有限的情境下表現良好，但當訓練資料量龐大時運算\n成本會顯著上升；"}, {"label": "D", "text": "(D)具備強大的特徵自動萃取能力，特別適合影像與語音等需要逐層抽象化處理\n的複雜任務"}], "answer": "C", "full": "某資安公司正在評估導入機器學習模型來偵測網路流量中的異常連線行為。技\n術團隊在比較各種演算法時，其中一位工程師建議採用支援向量機（SVM）。請\n問下列何者最正確敘述支援向量機的特性？\n(A)擅長處理大規模非結構化資料，且模型訓練完成後可自動適應新進資料而無\n需重新建模；\n(B)透過多個模型的集體決策來提升預測穩定性，在資料量不足時仍能維持一定\n的準確率；\n(C)在高維度且樣本數相對有限的情境下表現良好，但當訓練資料量龐大時運算\n成本會顯著上升；\n(D)具備強大的特徵自動萃取能力，特別適合影像與語音等需要逐層抽象化處理\n的複雜任務"}, {"number": 42, "question": "下列哪一項是可解釋人工智慧（XAI）領域，LIME（Local Interpretable Model-\nagnostic Explanations）最可能被用於的情境？", "options": [{"label": "A", "text": "(A)分析即時通訊系統中訊息傳輸效率的瓶頸；"}, {"label": "B", "text": "(B)建立機制以強化系統中的資料安全與隱私保護；"}, {"label": "C", "text": "(C)當某筆貸款申請被模型拒絕時，分析該筆資料中各項因素與結果之間的關\n聯；"}, {"label": "D", "text": "(D)監控並優化推薦系統的回應速度與系統效能，以提升整體使用體驗"}], "answer": "C", "full": "下列哪一項是可解釋人工智慧（XAI）領域，LIME（Local Interpretable Model-\nagnostic Explanations）最可能被用於的情境？\n(A)分析即時通訊系統中訊息傳輸效率的瓶頸；\n(B)建立機制以強化系統中的資料安全與隱私保護；\n(C)當某筆貸款申請被模型拒絕時，分析該筆資料中各項因素與結果之間的關\n聯；\n(D)監控並優化推薦系統的回應速度與系統效能，以提升整體使用體驗"}, {"number": 43, "question": "某信用評分公司導入SHAP（SHapley Additive exPlanations）框架分析機器學習\n模型的輸出行為。分析師希望了解：「對於某位特定申請人被評為高風險的信用\n評分，各項輸入特徵分別對這個評分結果貢獻了多少」。下列哪一項最能正確說\n明SHAP Shapley 值在此情境中所提供的資訊？", "options": [{"label": "A", "text": "(A)各特徵在模型訓練過程中對結果穩定性的影響程度；"}, {"label": "B", "text": "(B)此申請人的各項特徵，分別讓風險評分上升或下降的影響程度；"}, {"label": "C", "text": "(C)各特徵在所有客戶資料中對整體預測準確度的影響程度；"}, {"label": "D", "text": "(D)各特徵在模型中被使用的頻率"}], "answer": "B", "full": "某信用評分公司導入SHAP（SHapley Additive exPlanations）框架分析機器學習\n模型的輸出行為。分析師希望了解：「對於某位特定申請人被評為高風險的信用\n評分，各項輸入特徵分別對這個評分結果貢獻了多少」。下列哪一項最能正確說\n明SHAP Shapley 值在此情境中所提供的資訊？\n(A)各特徵在模型訓練過程中對結果穩定性的影響程度；\n(B)此申請人的各項特徵，分別讓風險評分上升或下降的影響程度；\n(C)各特徵在所有客戶資料中對整體預測準確度的影響程度；\n(D)各特徵在模型中被使用的頻率"}, {"number": 44, "question": "某金融集團評估將大型語言模型導入客服與風控系統，團隊採用如120B 參數等\n級的超大型語言模型以確保回應品質。請問下列何者最能說明企業在正式環境\n部署超大型語言模型時，最需要優先考量的因素？", "options": [{"label": "A", "text": "(A)模型參數量龐大，導致每次輸出結果差異極大，難以符合金融業對回應一致\n性的要求；"}, {"label": "B", "text": "(B)超大型模型無法支援批次處理，在高併發的客服場景下將造成嚴重的服務瓶\n頸；"}, {"label": "C", "text": "(C)推理延遲較高且運算資源消耗龐大，每次請求成本遠高於小型模型，需在模\n型效能與營運成本之間審慎權衡；"}, {"label": "D", "text": "(D)模型會依任務複雜度自動調整運算資源配置，因此不需特別考量推理成本"}], "answer": "C", "full": "某金融集團評估將大型語言模型導入客服與風控系統，團隊採用如120B 參數等\n級的超大型語言模型以確保回應品質。請問下列何者最能說明企業在正式環境\n部署超大型語言模型時，最需要優先考量的因素？\n(A)模型參數量龐大，導致每次輸出結果差異極大，難以符合金融業對回應一致\n性的要求；\n(B)超大型模型無法支援批次處理，在高併發的客服場景下將造成嚴重的服務瓶\n頸；\n(C)推理延遲較高且運算資源消耗龐大，每次請求成本遠高於小型模型，需在模\n型效能與營運成本之間審慎權衡；\n(D)模型會依任務複雜度自動調整運算資源配置，因此不需特別考量推理成本"}, {"number": 45, "question": "某智慧交通系統在城市主要路口安裝監視攝影機，需即時識別畫面中的汽車、\n機車、公車等不同車輛類型，並統計各路口的車輛流量以支援號誌控制優化。\n下列哪一種神經網路架構最適合處理此類影像中的物件類型識別任務？", "options": [{"label": "A", "text": "(A)循環神經網路（RNN），適合處理序列資料；"}, {"label": "B", "text": "(B)卷積神經網路（CNN），適合處理影像資料；"}, {"label": "C", "text": "(C)長短期記憶網路（LSTM），適合處理長期依賴；"}, {"label": "D", "text": "(D)多層感知機（MLP），將輸入資料轉換為數值後進行分類"}], "answer": "B", "full": "某智慧交通系統在城市主要路口安裝監視攝影機，需即時識別畫面中的汽車、\n機車、公車等不同車輛類型，並統計各路口的車輛流量以支援號誌控制優化。\n下列哪一種神經網路架構最適合處理此類影像中的物件類型識別任務？\n(A)循環神經網路（RNN），適合處理序列資料；\n(B)卷積神經網路（CNN），適合處理影像資料；\n(C)長短期記憶網路（LSTM），適合處理長期依賴；\n(D)多層感知機（MLP），將輸入資料轉換為數值後進行分類"}, {"number": 46, "question": "AutoSkill 框架的主要目標是什麼？", "options": [{"label": "A", "text": "(A)建立一個降低對大型語言模型（LLM）依賴的自動化系統；"}, {"label": "B", "text": "(B)透過持續更新模型參數來提升任務表現；"}, {"label": "C", "text": "(C)將重複的互動經驗轉化為可重複使用的明確技能模組；"}, {"label": "D", "text": "(D)透過檢索外部知識來改善模型回應品質"}], "answer": "C", "full": "AutoSkill 框架的主要目標是什麼？\n(A)建立一個降低對大型語言模型（LLM）依賴的自動化系統；\n(B)透過持續更新模型參數來提升任務表現；\n(C)將重複的互動經驗轉化為可重複使用的明確技能模組；\n(D)透過檢索外部知識來改善模型回應品質"}, {"number": 47, "question": "某大型語言模型（LLM）在訓練過程中，研究人員發現模型在生成文本時，長\n期集中產生少數幾種相似的回應形式，缺乏多樣性。下列何者最能說明此現象\n及其可能原因？", "options": [{"label": "A", "text": "(A)過度擬合（Overfitting）；"}, {"label": "B", "text": "(B)模式崩潰（Mode Collapse）；"}, {"label": "C", "text": "(C)梯度消失（Vanishing Gradient）；"}, {"label": "D", "text": "(D)模型收斂速度（Convergence Rate）"}], "answer": "B", "full": "某大型語言模型（LLM）在訓練過程中，研究人員發現模型在生成文本時，長\n期集中產生少數幾種相似的回應形式，缺乏多樣性。下列何者最能說明此現象\n及其可能原因？\n(A)過度擬合（Overfitting）；\n(B)模式崩潰（Mode Collapse）；\n(C)梯度消失（Vanishing Gradient）；\n(D)模型收斂速度（Convergence Rate）"}, {"number": 48, "question": "某電商平台建置機器學習模型，用於預測用戶在瀏覽特定商品後的購買機率。\n模型上線初期表現穩定，但維運團隊在定期審查中發現兩種不同情形：\n情形甲：模型上線半年後恰逢消費趨勢轉變，過去高購買意願的用戶行為模式\n（如長時間停留商品頁）不再是強烈的購買訊號，即便輸入特徵分布與訓練期\n相近，模型預測準確率仍明顯下降。\n情形乙：平台新增了行動裝置端的入口，新用戶的年齡分布、裝置類型與使用\n時段特徵與原訓練資料差異顯著，導致模型對這批用戶的預測偏差增大。\n下列哪一項最能正確對應兩種情形所屬的模型劣化類型？", "options": [{"label": "A", "text": "(A)甲為資料漂移（Data Drift）、乙為概念漂移（Concept Drift）；"}, {"label": "B", "text": "(B)甲為概念漂移（Concept Drift）、乙為資料漂移（Data Drift）；"}, {"label": "C", "text": "(C)甲為模型過擬合（Overfitting）、乙為資料漂移（Data Drift）；"}, {"label": "D", "text": "(D)甲與乙均屬概念漂移（Concept Drift），因為兩者都導致模型預測準確率下降"}], "answer": "B", "full": "某電商平台建置機器學習模型，用於預測用戶在瀏覽特定商品後的購買機率。\n模型上線初期表現穩定，但維運團隊在定期審查中發現兩種不同情形：\n情形甲：模型上線半年後恰逢消費趨勢轉變，過去高購買意願的用戶行為模式\n（如長時間停留商品頁）不再是強烈的購買訊號，即便輸入特徵分布與訓練期\n相近，模型預測準確率仍明顯下降。\n情形乙：平台新增了行動裝置端的入口，新用戶的年齡分布、裝置類型與使用\n時段特徵與原訓練資料差異顯著，導致模型對這批用戶的預測偏差增大。\n下列哪一項最能正確對應兩種情形所屬的模型劣化類型？\n(A)甲為資料漂移（Data Drift）、乙為概念漂移（Concept Drift）；\n(B)甲為概念漂移（Concept Drift）、乙為資料漂移（Data Drift）；\n(C)甲為模型過擬合（Overfitting）、乙為資料漂移（Data Drift）；\n(D)甲與乙均屬概念漂移（Concept Drift），因為兩者都導致模型預測準確率下降"}, {"number": 49, "question": "某資安公司目前以鑑別式AI 偵測已知網路攻擊。為因應新型變種攻擊，研究人\n員計劃利用生成式AI 模擬可能的攻擊流量，並納入防禦模型訓練。下列何者最\n能說明此做法對鑑別式AI 防禦模型的主要助益？", "options": [{"label": "A", "text": "(A)生成式AI 可取代真實攻擊資料，降低蒐集成本；"}, {"label": "B", "text": "(B)生成式AI 可直接負責防禦決策，取代原有模型；"}, {"label": "C", "text": "(C)模擬攻擊資料可使模型自動轉為生成式架構；"}, {"label": "D", "text": "(D)將模擬攻擊納入訓練，可提升模型對未知攻擊的辨識能力"}], "answer": "D", "full": "某資安公司目前以鑑別式AI 偵測已知網路攻擊。為因應新型變種攻擊，研究人\n員計劃利用生成式AI 模擬可能的攻擊流量，並納入防禦模型訓練。下列何者最\n能說明此做法對鑑別式AI 防禦模型的主要助益？\n(A)生成式AI 可取代真實攻擊資料，降低蒐集成本；\n(B)生成式AI 可直接負責防禦決策，取代原有模型；\n(C)模擬攻擊資料可使模型自動轉為生成式架構；\n(D)將模擬攻擊納入訓練，可提升模型對未知攻擊的辨識能力"}, {"number": 50, "question": "某企業已部署一套預訓練大型語言模型作為內部知識問答系統，主要用於查詢\n人資、財務與法遵相關的內部規範。由於公司內規每月都會滾動更新，管理層\n要求系統在文件更新後必須能立即反映最新內容，不能等待模型重新訓練。技\n術團隊正在評估應採用檢索增強生成（RAG）還是微調（Fine-tuning）來因應此\n需求。請問下列哪一項評估最為正確？", "options": [{"label": "A", "text": "(A)採用Fine-tuning 較為適合，只要定期將更新後的內規文件加入訓練資料，模\n型便能即時反映最新規範內容；"}, {"label": "B", "text": "(B)採用RAG 較為適合，將更新後的文件同步至外部知識庫，模型即可在不重\n新訓練的情況下立即查詢最新內容；"}, {"label": "C", "text": "(C)採用Fine-tuning 較為適合，因為模型經過內規語料訓練後，回應品質會優於\n透過RAG 生成的答案；"}, {"label": "D", "text": "(D)兩者皆可達成需求，差異僅在於建置成本高低，與系統能否即時反映更新內\n容無關"}], "answer": "B", "full": "某企業已部署一套預訓練大型語言模型作為內部知識問答系統，主要用於查詢\n人資、財務與法遵相關的內部規範。由於公司內規每月都會滾動更新，管理層\n要求系統在文件更新後必須能立即反映最新內容，不能等待模型重新訓練。技\n術團隊正在評估應採用檢索增強生成（RAG）還是微調（Fine-tuning）來因應此\n需求。請問下列哪一項評估最為正確？\n(A)採用Fine-tuning 較為適合，只要定期將更新後的內規文件加入訓練資料，模\n型便能即時反映最新規範內容；\n(B)採用RAG 較為適合，將更新後的文件同步至外部知識庫，模型即可在不重\n新訓練的情況下立即查詢最新內容；\n(C)採用Fine-tuning 較為適合，因為模型經過內規語料訓練後，回應品質會優於\n透過RAG 生成的答案；\n(D)兩者皆可達成需求，差異僅在於建置成本高低，與系統能否即時反映更新內\n容無關"}];
let current = 0;
let userAnswers = Array(questions.length).fill(null);
let locked = false;

function startQuiz(){
  document.getElementById('home').style.display='none';
  document.getElementById('quiz').style.display='block';
  renderQuestion();
}
function letterIndex(letter){ return {A:0,B:1,C:2,D:3}[letter]; }
function indexLetter(i){ return ['A','B','C','D'][i] || ''; }
function countCorrect(){ return questions.reduce((sum,q,i)=> sum + (userAnswers[i]===q.answer ? 1 : 0),0); }
function renderQuestion(){
  locked = userAnswers[current] !== null;
  const q = questions[current];
  document.getElementById('counter').textContent = `第 ${current+1} / ${questions.length} 題`;
  document.getElementById('scoreNow').textContent = `目前答對 ${countCorrect()} 題`;
  document.getElementById('bar').style.width = `${((current+1)/questions.length)*100}%`;
  document.getElementById('qno').textContent = `第 ${q.number} 題`;
  document.getElementById('question').textContent = q.question;
  const opts = q.options.map((opt,idx)=>{
    let cls = 'option';
    const chosen = userAnswers[current];
    if(chosen!==null){
      if(opt.label===q.answer) cls += ' correct';
      if(opt.label===chosen && chosen!==q.answer) cls += ' wrong';
      if(opt.label===chosen) cls += ' selected';
    }
    return `<div class="${cls}" onclick="chooseAnswer('${opt.label}')">${escapeHtml(opt.text)}</div>`;
  }).join('');
  document.getElementById('options').innerHTML = opts;
  const fb = document.getElementById('feedback');
  const nextBtn = document.getElementById('nextBtn');
  if(userAnswers[current]===null){
    fb.style.display='none';
    fb.className='feedback';
    fb.textContent='';
    nextBtn.disabled=true;
    nextBtn.textContent = current===questions.length-1 ? '查看成績' : '下一題';
  } else {
    showFeedback();
    nextBtn.disabled=false;
    nextBtn.textContent = current===questions.length-1 ? '查看成績' : '下一題';
  }
}
function chooseAnswer(label){
  if(userAnswers[current]!==null) return;
  userAnswers[current] = label;
  renderQuestion();
}
function showFeedback(){
  const q = questions[current];
  const chosen = userAnswers[current];
  const fb = document.getElementById('feedback');
  const correctText = q.options.find(o=>o.label===q.answer)?.text || q.answer;
  if(chosen === q.answer){
    fb.className='feedback ok';
    fb.innerHTML = `✅ 答對！<br>正確答案：${escapeHtml(correctText)}`;
  } else {
    fb.className='feedback bad';
    fb.innerHTML = `❌ 答錯！<br>正確答案：${escapeHtml(correctText)}`;
  }
  fb.style.display='block';
}
function nextQuestion(){
  if(userAnswers[current]===null) return;
  if(current < questions.length-1){ current++; renderQuestion(); window.scrollTo(0,0); }
  else showResult();
}
function showResult(){
  document.getElementById('quiz').style.display='none';
  const correct = countCorrect();
  const wrong = questions.length - correct;
  const score = correct * 2;
  const wrongItems = questions.filter((q,i)=>userAnswers[i]!==q.answer);
  let wrongHtml = '';
  if(wrongItems.length===0){
    wrongHtml = '<p>太棒了，沒有錯題！</p>';
  } else {
    wrongHtml = wrongItems.map(q=>{
      const idx = questions.findIndex(x=>x.number===q.number);
      const user = userAnswers[idx] || '未作答';
      return `<div class="wrong-card">
        <h3>第 ${q.number} 題</h3>
        <div class="question">${escapeHtml(q.question)}</div>
        ${q.options.map(o=>`<div class="option">${escapeHtml(o.text)}</div>`).join('')}
        <p><b>你的答案：</b>${escapeHtml(user)}</p>
        <p><b>正確答案：</b>${escapeHtml(q.answer)}. ${escapeHtml((q.options.find(o=>o.label===q.answer)||{text:''}).text.replace(/^\([A-D]\)/,''))}</p>
      </div>`;
    }).join('');
  }
  const result = document.getElementById('result');
  result.style.display='block';
  result.innerHTML = `<h1 class="title">測驗完成</h1>
    <div class="result-grid">
      <div class="stat"><span>總分</span><b>${score}</b><span class="small">/ 100 分</span></div>
      <div class="stat"><span>答對</span><b>${correct}</b><span class="small">題</span></div>
      <div class="stat"><span>答錯</span><b>${wrong}</b><span class="small">題</span></div>
    </div>
    <button class="btn secondary" onclick="location.reload()">重新測驗</button>
    <div class="review"><h2>錯題回顧</h2>${wrongHtml}</div>`;
  window.scrollTo(0,0);
}
function escapeHtml(s){
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
</script>
</body>
</html>
