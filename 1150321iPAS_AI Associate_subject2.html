<style>
:root {

<script>
const questions = [{"number": 1, "answer": "A", "stem": "某零售企業導入生成式AI 商品推薦系統。測試結果顯示，在購物行為、偏好設定\n與價格區間相同的情況下，不同客戶族群收到的推薦商品類型仍出現明顯差異，\n且差異方向不易以既有行銷策略解釋。若在模型架構與推論設定皆未調整情形\n下，專案目標是優先降低可能的模型偏差風險，下列何者最合理？", "options": [{"label": "A", "text": "(A)重新檢視訓練資料的樣本分布與代表性；"}, {"label": "B", "text": "(B)限制推薦結果僅顯示高銷量商品；"}, {"label": "C", "text": "(C)降低模型參數規模以簡化決策邏輯；"}, {"label": "D", "text": "(D)提高推薦結果的隨機性以增加多樣性"}]}, {"number": 2, "answer": "D", "stem": "在進行大型語言模型 (LLM) 企業專屬知識的Fine-tuning 時，若內部GPU 運算資\n源與記憶體嚴重受限，下列哪一種參數高效微調（PEFT, Parameter Efficient Fine-\nTuning）技術最能在維持模型效能的前提下，顯著降低需更新的參數數量？", "options": [{"label": "A", "text": "(A)知識蒸餾（Knowledge Distillation）；"}, {"label": "B", "text": "(B)提示詞工程（Prompt Engineering）；"}, {"label": "C", "text": "(C)梯度凍結（Gradient Freezing）；"}, {"label": "D", "text": "(D)低秩適配（Low-Rank Adaptation）"}]}, {"number": 3, "answer": "A", "stem": "某企業規劃透過Low-Code 平台建置可視化儀表板，以支援營運數據的即時監控\n與分析判讀。若企業特別關注儀表板顯示結果的穩定性與分析可信度，下列何者\n最應優先確認？", "options": [{"label": "A", "text": "(A)是否具備穩定的資料串接能力與即時更新機制；"}, {"label": "B", "text": "(B)是否提供自動化決策建議與預測分析模組；"}, {"label": "C", "text": "(C)是否支援彈性介面設計與多角色權限管理；"}, {"label": "D", "text": "(D)是否整合流程觸發與跨系統通知功能"}]}, {"number": 4, "answer": "D", "stem": "某企業導入生成式AI 客服系統後發現，系統整體運作穩定，且在單位時間內可處\n理大量對話請求。部分使用者仍反映在互動過程中回覆出現卡頓感，經初步排除\n網路連線與前端介面效能問題後，若專案團隊希望針對此現象進行效能測試，下\n列何者最符合測試重點？", "options": [{"label": "A", "text": "(A)評估系統長時間運作的穩定程度；"}, {"label": "B", "text": "(B)測量系統單位時間的總處理量；"}, {"label": "C", "text": "(C)比較不同回覆內容的語言品質；"}, {"label": "D", "text": "(D)分析單次互動回覆的反應速度表現"}]}, {"number": 5, "answer": "C", "stem": "某企業導入生成式AI 系統，希望自動產出客服回覆與內部文件摘要。系統需能理\n解使用者輸入的完整語句內容，並在回覆中維持語意連貫，即使對話內容較長仍\n能保持上下文一致性。基於上述需求，下列何種模型架構最為適合？", "options": [{"label": "A", "text": "(A)卷積神經網路（Convolutional Neural Network, CNN）；"}, {"label": "B", "text": "(B)遞迴神經網路（Recurrent Neural Network, RNN）；"}, {"label": "C", "text": "(C)基於Transformer 架構的自迴歸模型（Autoregressive Model）；"}, {"label": "D", "text": "(D)生成對抗網路（Generative Adversarial Network, GAN）"}]}, {"number": 6, "answer": "D", "stem": "OpenAI 已為Sora 生成的影片提供多種出處證明機制，以降低誤導性或欺騙性內\n容帶來的風險。下列何者不屬於目前OpenAI 官方為Sora 內容提供的出處證明工\n具？", "options": [{"label": "A", "text": "(A)所有資產上內嵌的C2PA（Content Credentials）元數據；"}, {"label": "B", "text": "(B)預設可見的動態浮水印；"}, {"label": "C", "text": "(C)用於追蹤生成內容的內部反向影像與音訊搜尋工具；"}, {"label": "D", "text": "(D)平台對外開放的實時來源驗證介面"}]}, {"number": 7, "answer": "A", "stem": "某企業導入No-Code/Low-Code 平台，讓各部門能自行建立資料分析與流程應用。\n隨著使用範圍擴大，管理層開始關注資料權限、存取紀錄與合規要求。依資料治\n理觀點，下列何者最合理描述此類平台對企業治理機制的典型影響？", "options": [{"label": "A", "text": "(A)平台內建角色權限與資料存取控管機制，有助治理制度落實；"}, {"label": "B", "text": "(B)平台強化部門自主性，通常使既有治理流程難以延續；"}, {"label": "C", "text": "(C)平台主要支援應用快速開發，資料治理仍需完全仰賴外部系統；"}, {"label": "D", "text": "(D)平台透過自動化設定機制，可顯著降低治理與合規管理需求"}]}, {"number": 8, "answer": "D", "stem": "某製造企業規劃於設備端建置邊緣運算（Edge Computing）架構，並以No-\nCode/Low-Code 平台開發即時監控應用。測試顯示，系統在雲端環境執行順暢，\n但部署至邊緣裝置後出現回應延遲與效能下降。依此情境判斷，下列何者最合理\n解釋該現象？", "options": [{"label": "A", "text": "(A)邊緣運算架構可降低系統對效能的需求；"}, {"label": "B", "text": "(B)No-Code/Low-Code 平台僅能在雲端環境執行；"}, {"label": "C", "text": "(C)雲端部署通常比邊緣部署更容易出現延遲；"}, {"label": "D", "text": "(D)邊緣裝置通常受限於運算能力與可用資源"}]}, {"number": 9, "answer": "B", "stem": "某企業使用生成式AI 進行文字分類，初期僅根據既有業務資料設計少量樣本提示\n（Few-shot Prompting）。當模型應用至新市場資料時，團隊發現分類結果明顯不穩\n定，且原先提供的範例並未涵蓋新市場常見的表達方式。依此情境判斷，下列何\n者最可能為主要原因？", "options": [{"label": "A", "text": "(A)模型容易對單一範例產生過度記憶；"}, {"label": "B", "text": "(B)少量範例難以涵蓋新情境的資料差異；"}, {"label": "C", "text": "(C)Prompt 設計無法引導模型擷取共通特徵；"}, {"label": "D", "text": "(D)模型推理能力不足以完成分類任務"}]}, {"number": 10, "answer": "D", "stem": "某企業建置檢索增強生成（Retrieval-augmented generation, RAG）系統支援內部知\n識查詢。隨著使用量提升，團隊發現模型回覆品質穩定，但推論延遲與運算成本\n逐漸增加。專案規劃在維持回覆品質前提下進行效能優化。在此情境下，若採用\n知識蒸餾（Knowledge Distillation），下列敘述何者最為合理？", "options": [{"label": "A", "text": "(A)將檢索資料轉換為結構化規則以取代模型；"}, {"label": "B", "text": "(B)僅透過增加檢索文件數量改善效能；"}, {"label": "C", "text": "(C)停用生成模型以避免延遲問題；"}, {"label": "D", "text": "(D)使小型模型學習大型模型行為，以降低推論成本"}]}, {"number": 11, "answer": "B", "stem": "某零售企業規劃提升門市數據應用能力，目標包括：門市主管可自行調整分析畫\n面與檢視指標呈現，以及由行銷部門建立銷售預測模型，以支援補貨與促銷規\n劃。企業在選型時以工具的主要功能定位與典型用途作為評估依據。依此需求判\n斷，下列哪一項AI 工具使用規劃最合理？", "options": [{"label": "A", "text": "(A)以AutoML 作為分析介面調整平台，No-Code 平台用於模型訓練；"}, {"label": "B", "text": "(B)以No-Code 平台支援分析與介面調整，AutoML 負責模型建立；"}, {"label": "C", "text": "(C)僅導入No-Code 平台，同時滿足高階模型建立與分析需求；"}, {"label": "D", "text": "(D)僅導入AutoML，以兼顧介面調整與模型訓練"}]}, {"number": 12, "answer": "B", "stem": "下列何者最能正確說明Model Context Protocol（MCP）與檢索增強生成\n（Retrieval-Augmented Generation, RAG）在功能定位上的主要差異？", "options": [{"label": "A", "text": "(A)MCP 主要用於降低模型訓練成本；RAG 主要用於提升推論速度；"}, {"label": "B", "text": "(B)MCP 著重模型與外部工具或系統互動；RAG 著重補充模型知識來源；"}, {"label": "C", "text": "(C)RAG 必須依賴向量資料庫；MCP 不需任何外部整合；"}, {"label": "D", "text": "(D)RAG 屬標準化通訊協議；MCP 屬資料檢索技術"}]}, {"number": 13, "answer": "B", "stem": "某企業建置文件型知識查詢系統，將大量長篇內部文件轉換為可供生成式AI 使用\n的知識來源。在測試過程中，團隊發現若直接以整份文件進行檢索，模型回覆常\n包含無關內容，且引用段落不夠精準。團隊評估後，決定導入Chunking 機制的主\n要目的為何？", "options": [{"label": "A", "text": "(A)透過縮短輸入長度，加速模型推理流程；"}, {"label": "B", "text": "(B)提升檢索結果的語意對齊程度，並降低長文件帶來的干擾；"}, {"label": "C", "text": "(C)減少模型執行時的記憶體使用量，以提升系統穩定性；"}, {"label": "D", "text": "(D)讓模型在生成回覆時具備更高的創意發揮空間"}]}, {"number": 14, "answer": "A", "stem": "某企業導入大型語言模型（LLM）分析內部報表，使用者經常提供 Excel 匯出的\n表格資料（如銷售數據與統計表）。測試時發現，模型對原始表格解析效果不穩\n定。為提升模型理解與回應品質，下列哪一種上下文工程（Context Engineering）\n作法較為適當？", "options": [{"label": "A", "text": "(A)將表格內容轉換為結構化JSON 或Markdown table；"}, {"label": "B", "text": "(B)在維持原始表格呈現方式下，補充欄位與數據說明；"}, {"label": "C", "text": "(C)將表格資料隨機切割後分段輸入；"}, {"label": "D", "text": "(D)直接提供原始表格內容以保留完整資訊"}]}, {"number": 15, "answer": "D", "stem": "在生成式AI 應用設計中，情境感知代理（Context-aware Agent）的核心特性為\n何？", "options": [{"label": "A", "text": "(A)能依任務需求即時重新訓練模型參數以優化結果；"}, {"label": "B", "text": "(B)僅依使用者當前輸入指令執行任務，不保留歷程資訊；"}, {"label": "C", "text": "(C)具備跨模態處理能力，可同時理解文字與影像內容；"}, {"label": "D", "text": "(D)能利用對話歷史、任務狀態調整行為與決策"}]}, {"number": 16, "answer": "D", "stem": "某企業建置Agentic AI 系統處理跨部門複雜任務，團隊以解決方案圖譜（Solution\nGraph）作為規劃框架。下列何者為Solution Graph 的主要功能？", "options "(A)採用雲端大型語言模型 API，並透過資料遮罩與加密機制降低外洩風險；"}, {"label": "B", "text": "(B)導入開源模型進行私有化部署，以兼顧成本彈性與模型可控性；"}, {"label": "C", "text": "(C)自行訓練並私有化部署模型，同時建立存取控管與稽核機制；"}, {"label": "D", "text": "(D)先驗證模型效益，再逐步補強合規與資安架構"}]}, {"number": 47, "answer": "A", "stem": "某製造企業規劃導入生成式AI 協助產線異常紀錄分析，系統將根據設備回報與維\n修紀錄自動產出問題摘要與建議處置說明。在試行測試階段，為降低營運與決策\n風險，下列何者最應優先驗證？", "options": [{"label": "A", "text": "(A)AI 生成建議與實際工程判斷的一致性與正確性；"}, {"label": "B", "text": "(B)系統在高資料量輸入下的處理速度與延遲表現；"}, {"label": "C", "text": "(C)模型對不同設備品牌資料格式的轉換能力；"}, {"label": "D", "text": "(D)異常分析報告的視覺化呈現與介面易讀性"}]}, {"number": 48, "answer": "C", "stem": "某企業將機器學習模型部署於線上推薦系統。模型在測試階段表現良好，但上線\n數月後，點擊率與預測準確度逐漸下降。經分析發現，近期使用者行為模式與模\n型訓練期間的資料特徵出現顯著變化。此現象最可能屬於下列何者？", "options": [{"label": "A", "text": "(A)模型過度擬合訓練資料，無法泛化至未知樣本；"}, {"label": "B", "text": "(B)特徵工程設計不佳，導致輸入資訊不足；"}, {"label": "C", "text": "(C)資料統計特徵隨時間改變，影響模型推論效果；"}, {"label": "D", "text": "(D)系統資料結構調整，造成特徵欄位錯置"}]}, {"number": 49, "answer": "B", "stem": "某企業使用Low-Code 平台建置內部營運系統，系統需整合財務、庫存與第三方\n物流服務。團隊希望確保系統在跨部門流程與外部服務整合下，具高可靠性與可\n測試性。下列哪一項作法最能達成目標？", "options": [{"label": "A", "text": "(A)只透過平台提供的流程模擬與即時預覽，檢查常用操作路徑；"}, {"label": "B", "text": "(B)建立自動化測試流程，結合模擬外部服務與可重複執行的整合測試；"}, {"label": "C", "text": "(C)將測試重點放在使用者介面操作，確認操作流程是否順暢；"}, {"label": "D", "text": "(D)上線後再透過使用者回饋與報表監控系統行為，進行修正"}]}, {"number": 50, "answer": "C", "stem": "某招聘公司使用生成式AI 生成面試問題與候選人評估建議。團隊發現模型可能對\n性別或年齡產生的資料分布偏差。下列哪一種策略最能有效降低生成偏差輸出的\n風險？", "options": [{"label": "A", "text": "(A)調整模型架構與參數，使生成更靈活與多樣化；"}, {"label": "B", "text": "(B)大幅增加訓練資料量，但不清理或平衡資料中的性別與年齡分布；"}, {"label": "C", "text": "(C)在生成後對模型輸出進行人工審查，並依偏差情況修正結果；"}, {"label": "D", "text": "(D)僅允許高階主管操作系統，透過人員篩選控制生成結果"}]}];
let currentIndex = 0;
let userAnswers = Array(questions.length).fill(null);
let locked = false;

function show(id) {
  document.querySelectorAll("section").forEach(sec => sec.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function startQuiz() {
  currentIndex = 0;
  userAnswers = Array(questions.length).fill(null);
  locked = false;
  show("quiz");
  renderQuestion();
}

function renderQuestion() {
  locked = false;
  const q = questions[currentIndex];
  document.getElementById("currentNo").textContent = currentIndex + 1;
  document.getElementById("answeredCount").textContent = userAnswers.filter(x => x !== null).length;
  document.getElementById("progressInner").style.width = ((currentIndex + 1) / questions.length * 100) + "%";
  document.getElementById("questionStem").textContent = q.stem;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";
  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt.text;
    btn.onclick = () => chooseAnswer(opt.label);
    optionsDiv.appendChild(btn);
  });

  const feedback = document.getElementById("feedback");
  feedback.className = "feedback";
  feedback.textContent = "";
  document.getElementById("nextBtn").classList.add("hidden");
}

function chooseAnswer(label) {
  if (locked) return;
  locked = true;
  const q = questions[currentIndex];
  userAnswers[currentIndex] = label;

  const buttons = document.querySelectorAll(".option");
  buttons.forEach(btn => {
    btn.classList.add("disabled");
    const optionLabel = btn.textContent.trim().charAt(1);
    if (optionLabel === q.answer) btn.classList.add("correct");
    if (optionLabel === label && label !== q.answer) btn.classList.add("wrong");
  });

  const feedback = document.getElementById("feedback");
  if (label === q.answer) {
    feedback.className = "feedback correct";
    feedback.textContent = "✅ 答對！正確答案：" + getAnswerText(q);
  } else {
    feedback.className = "feedback wrong";
    feedback.textContent = "❌ 答錯！正確答案：" + getAnswerText(q);
  }

  const nextBtn = document.getElementById("nextBtn");
  nextBtn.textContent = currentIndex === questions.length - 1 ? "查看成績" : "下一題";
  nextBtn.classList.remove("hidden");
}

function nextQuestion() {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    showResult();
  }
}

function getAnswerText(q) {
  const found = q.options.find(o => o.label === q.answer);
  return found ? found.text : q.answer;
}

function getUserAnswerText(q, label) {
  if (!label) return "未作答";
  const found = q.options.find(o => o.label === label);
  return found ? found.text : label;
}

function showResult() {
  let correct = 0;
  const wrongs = [];
  questions.forEach((q, i) => {
    if (userAnswers[i] === q.answer) correct++;
    else wrongs.push({ q, userAnswer: userAnswers[i] });
  });

  const wrong = questions.length - correct;
  const score = correct * 2;

  let html = `
    <div class="result-title">測驗完成</div>
    <div class="result-grid">
      <div class="stat"><div class="num">${score}</div><div class="label">分數</div></div>
      <div class="stat"><div class="num">${correct}</div><div class="label">答對</div></div>
      <div class="stat"><div class="num">${wrong}</div><div class="label">答錯</div></div>
    </div>
  `;

  if (wrongs.length === 0) {
    html += `<p>🎉 全部答對，太厲害了！</p>`;
  } else {
    html += `<h3>錯題回顧</h3>`;
    wrongs.forEach(item => {
      const q = item.q;
      const optionsText = q.options.map(o => o.text).join("\n\n");
      html += `
        <div class="wrong-card">
          <div class="wrong-title">第 ${q.number} 題</div>
          <div class="wrong-stem">${escapeHtml(q.stem)}</div>
          <div class="wrong-options">${escapeHtml(optionsText)}</div>
          <div class="answer-box">
            <div class="answer-line">你的答案：${escapeHtml(getUserAnswerText(q, item.userAnswer))}</div>
            <div class="answer-line correct-answer">正確答案：${escapeHtml(getAnswerText(q))}</div>
          </div>
        </div>
      `;
    });
  }

  html += `<button class="btn secondary" onclick="startQuiz()">重新測驗</button>`;
  document.getElementById("result").innerHTML = html;
  show("result");
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
</script>
