<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>115年第1次 AI 應用規劃師-初級｜人工智慧基礎概論【機器學習】模擬題練習</title>
<style>
body{margin:0;background:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;color:#1f2937;line-height:1.7}
.wrap{max-width:760px;margin:auto;padding:16px}.card{background:#fff;border-radius:18px;padding:22px;box-shadow:0 8px 24px #00000012}.hidden{display:none}
h1{font-size:24px;line-height:1.4}.muted{color:#6b7280;white-space:pre-wrap}.top{display:flex;justify-content:space-between;color:#6b7280}
.progress{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:10px 0 20px}.bar{height:100%;background:#2563eb;width:0}
.qno{font-weight:800;margin-bottom:8px}.stem{font-weight:700;font-size:18px;white-space:pre-wrap;margin-bottom:14px}
.opt{display:block;width:100%;text-align:left;padding:13px;margin:9px 0;border:1px solid #e5e7eb;border-radius:12px;background:#fff;white-space:pre-wrap;font-size:16px}
.opt.good{background:#dcfce7;border-color:#86efac}.opt.bad{background:#fee2e2;border-color:#fecaca}
.feedback{margin-top:14px;padding:13px;border-radius:12px;font-weight:800}.feedback.good{background:#dcfce7;color:#166534}.feedback.bad{background:#fee2e2;color:#991b1b}
.btn{width:100%;margin-top:16px;padding:13px;border:0;border-radius:12px;background:#2563eb;color:#fff;font-size:17px;font-weight:800}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;text-align:center;padding:12px}
.num{font-size:24px;font-weight:900}.wrong{border:1px solid #e5e7eb;border-radius:14px;padding:14px;margin:12px 0}.wrong h3{color:#be123c}
.pre{white-space:pre-wrap}.answers{border-top:3px solid #ef4444;margin-top:12px;padding-top:10px;font-weight:800}
@media(max-width:480px){.grid{grid-template-columns:1fr}h1{font-size:21px}}
</style></head><body><div class="wrap">
<section id="home" class="card"><h1>115 年第1次 AI 應用規劃師-初級。科目人工智慧基礎概論【機器學習】模擬題練習，共10題。</h1>
<p class="muted">每題作答後會立即顯示正確答案，完成後會統計分數、答對、答錯，並列出錯題內容。</p>
<p class="muted">共10題｜單選題｜每題10分｜滿分100分</p><button class="btn" onclick="start()">開始測驗</button></section>
<section id="quiz" class="card hidden"><div class="top"><span>第 <b id="now"></b> / 10 題</span><span>目前作答：<b id="done"></b> 題</span></div>
<div class="progress"><div id="bar" class="bar"></div></div><div id="orig" class="qno"></div><div id="stem" class="stem"></div><div id="opts"></div><div id="fb"></div>
<button id="next" class="btn hidden" onclick="nextQ()">下一題</button></section><section id="result" class="card hidden"></section></div>
<script>
const qs=[{"number": 1, "stem": "關於「監督式學習 (Supervised Learning)」的敘述，下列何者正確？", "options": [{"label": "A", "text": "(A) \n模型在訓練過程中完全不需要任何標籤資料"}, {"label": "B", "text": "(B) 模型主要透過與環境互動獲得\n的「獎勵」來學習"}, {"label": "C", "text": "(C) 模型是透過學習輸入特徵與「既定目標標註」之間的對\n應關係來進行預測"}, {"label": "D", "text": "(D) 模型主要用於在沒有答案的情況下自動將資料分群"}], "answer": "C"}, {"number": 2, "stem": "在處理機器學習的類別型特徵（如：顏色、性別）時，為了讓 AI 能夠處理\n這些文字，最直接將其轉換為 0 與 1 數值格式的技術是？", "options": [{"label": "A", "text": "(A) 資料分群 \n(Data Clustering)"}, {"label": "B", "text": "(B) 卷積神經網路 (CNN)"}, {"label": "C", "text": "(C) One-hot 編碼 (One-hot \nEncoding)"}, {"label": "D", "text": "(D) 均方誤差 (RMSE)"}], "answer": "C"}, {"number": 3, "stem": "某電商平台想要建立一個預測模型，找出極少數會進行惡意刷退的帳號。由\n於正常帳號佔 99.9%，若直接用「準確率 (Accuracy)」來衡量模型，可能會\n產生偏誤。請問下列哪一個指標最能有效衡量模型對「刷退帳號（瑕疵/異\n常）」的辨識能力？", "options": [{"label": "A", "text": "(A) 決定係數 (R²)"}, {"label": "B", "text": "(B) F1-score"}, {"label": "C", "text": "(C) 均方誤差 (RMSE)"}, {"label": "D", "text": "(D) 訓練誤差"}], "answer": "B"}, {"number": 4, "stem": "某自駕車系統需要「即時」辨識前方監視器影像中是否有行人出現，並標示\n出行人的具體位置。請問下列哪一種神經網路架構最適合處理此類「影像辨識\n與區域標示」任務？", "options": [{"label": "A", "text": "(A) 長短期記憶網路 (LSTM)"}, {"label": "B", "text": "(B) 自編碼器 (AE)"}, {"label": "C", "text": "(C) 卷\n積神經網路 (CNN)"}, {"label": "D", "text": "(D) 循環神經網路 (RNN)"}], "answer": "C"}, {"number": 5, "stem": "某醫院開發了一套癌症篩檢 AI，院方強調「絕不能漏掉任何一個可能的癌\n症患者」。即便會增加一些誤報（原本沒病卻被叫回來檢查），也必須確保篩出\n所有病人。請問該模型應優先提升哪一項指標？", "options": [{"label": "A", "text": "(A) 精準率 (Precision)"}, {"label": "B", "text": "(B) \n召回率 (Recall)"}, {"label": "C", "text": "(C) 假陽性率 (False Positive Rate)"}, {"label": "D", "text": "(D) 準確率 (Accuracy)"}], "answer": "B"}, {"number": 6, "stem": "某物流系統在運行中會根據目前的交通狀況「動態調整」車輛行駛路線，如\n果選對路線會得到正面回饋（績效提升），選錯則會被扣分。這最符合哪一種學\n\n習機制的特徵？", "options": [{"label": "A", "text": "(A) 強化式學習的獎勵機制"}, {"label": "B", "text": "(B) 監督式學習的標籤對應"}, {"label": "C", "text": "(C) \n非監督式學習的自動分群"}, {"label": "D", "text": "(D) 自監督式學習的填字遊戲"}], "answer": "A"}, {"number": 7, "stem": "某工廠要建立瑕疵檢測系統，但手邊「有標籤」的瑕疵照片只有 100 張，\n另外還有 10,000 張「沒有標籤」的生產照片。若希望能同時利用這兩批資料\n來訓練模型，最適合的方法是？", "options": [{"label": "A", "text": "(A) 監督式學習"}, {"label": "B", "text": "(B) 非監督式學習"}, {"label": "C", "text": "(C) 半監\n督式學習 (Semi-supervised Learning)"}, {"label": "D", "text": "(D) 反事實解釋"}], "answer": "C"}, {"number": 8, "stem": "在可解釋 AI (XAI) 技術中，若某銀行想向客戶解釋：「因為您的存款低於 \n10 萬，所以貸款被拒絕；但如果您存款能增加到 20 萬，貸款就會審核通\n過」。這種分析「資料變動對決策結果影響」的技術稱為？", "options": [{"label": "A", "text": "(A) 顯著性圖 \n(Saliency Map)"}, {"label": "B", "text": "(B) LIME"}, {"label": "C", "text": "(C) 反事實解釋 (Counterfactual Explanation)"}, {"label": "D", "text": "(D) \nSHAP"}], "answer": "C"}, {"number": 9, "stem": "某大型推薦系統（如 Netflix）希望模型既能「記住」用戶過去喜歡的特定\n標籤組合，又能具備「泛化能力」去預測用戶以前沒看過、但可能感興趣的新\n組合。下列哪種模型架構最適合此種雙重需求？", "options": [{"label": "A", "text": "(A) 寬深模型 (Wide and \nDeep)"}, {"label": "B", "text": "(B) 單純的線性迴歸"}, {"label": "C", "text": "(C) 單純的決策樹"}, {"label": "D", "text": "(D) K-means 分群"}], "answer": "A"}, {"number": 10, "stem": "團隊在訓練一個 50 層的深層神經網路時，發現訓練誤差（Training \nError）完全不下降，且參數更新極為緩慢，出現「學習停滯」。經診斷認為是\n「梯度傳遞效率」不佳，請問下列哪種方式最能直接改善此問題？", "options": [{"label": "A", "text": "(A) 延長訓\n練時間，讓模型慢慢學"}, {"label": "B", "text": "(B) 增加更多訓練資料"}, {"label": "C", "text": "(C) 調整模型中的「啟動函數 \n(Activation Function)」設定"}, {"label": "D", "text": "(D) 刪除所有的標籤資料改用非監督式學習"}], "answer": "C"}];let idx=0,ua=Array(qs.length).fill(null),locked=false;
function show(id){document.querySelectorAll('section').forEach(x=>x.classList.add('hidden'));document.getElementById(id).classList.remove('hidden')}
function start(){idx=0;ua=Array(qs.length).fill(null);show('quiz');render()}
function render(){locked=false;const q=qs[idx];now.textContent=idx+1;done.textContent=ua.filter(x=>x!==null).length;bar.style.width=((idx+1)/qs.length*100)+'%';orig.textContent='第 '+q.number+' 題';stem.textContent=q.stem;opts.innerHTML='';q.options.forEach(o=>{const b=document.createElement('button');b.className='opt';b.textContent=o.text;b.dataset.label=o.label;b.onclick=()=>answer(o.label);opts.appendChild(b)});fb.innerHTML='';next.classList.add('hidden')}
function answer(label){if(locked)return;locked=true;const q=qs[idx];ua[idx]=label;document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.dataset.label===q.answer)b.classList.add('good');if(b.dataset.label===label&&label!==q.answer)b.classList.add('bad')});const c=q.options.find(o=>o.label===q.answer).text;fb.className='feedback '+(label===q.answer?'good':'bad');fb.textContent=(label===q.answer?'✅ 答對！':'❌ 答錯！')+'正確答案：'+c;next.textContent=idx===qs.length-1?'查看成績':'下一題';next.classList.remove('hidden')}
function nextQ(){if(idx<qs.length-1){idx++;render()}else results()}
function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function at(q,l){if(!l)return'未作答';return q.options.find(o=>o.label===l)?.text||l}
function results(){let c=0,w=[];qs.forEach((q,i)=>{if(ua[i]===q.answer)c++;else w.push({q,user:ua[i]})});let h=`<h1>測驗完成</h1><div class="grid"><div class="stat"><div class="num">${c*10}</div><div>分數</div></div><div class="stat"><div class="num">${c}</div><div>答對</div></div><div class="stat"><div class="num">${qs.length-c}</div><div>答錯</div></div></div>`;if(!w.length)h+='<p>🎉 全部答對，太厲害了！</p>';else{h+='<h2>錯題回顧</h2>';w.forEach(x=>{const q=x.q;h+=`<div class="wrong"><h3>第 ${q.number} 題</h3><div class="pre"><b>${esc(q.stem)}</b></div><div class="pre">${esc(q.options.map(o=>o.text).join('\n\n'))}</div><div class="answers">你的答案：${esc(at(q,x.user))}<br>正確答案：${esc(at(q,q.answer))}</div></div>`})}h+='<button class="btn" onclick="start()">重新測驗</button>';result.innerHTML=h;show('result')}
</script></body></html>
