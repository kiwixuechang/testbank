<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>115 年第二次 AI 應用規劃師-初級｜機器學習模擬題練習</title>
<style>
:root {
  --bg:#f5f7fb; --card:#ffffff; --text:#1f2937; --muted:#6b7280;
  --primary:#2563eb; --primary-dark:#1d4ed8;
  --success-bg:#dcfce7; --success:#166534;
  --danger-bg:#fee2e2; --danger:#991b1b;
  --border:#e5e7eb; --wrong-title:#be123c;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.7;
}
.container { width:100%; max-width:760px; margin:0 auto; padding:18px; }
.card {
  background:var(--card);
  border-radius:20px;
  padding:22px;
  box-shadow:0 8px 24px rgba(15,23,42,.08);
}
.home-title {
  font-size:24px;
  line-height:1.35;
  margin:8px 0 12px;
  font-weight:800;
}
.home-desc {
  color:var(--muted);
  font-size:15px;
  white-space:pre-wrap;
}
.meta { color:var(--muted); font-size:15px; margin-top:10px; }
.btn {
  display:inline-flex;
  justify-content:center;
  align-items:center;
  width:100%;
  margin-top:16px;
  border:0;
  border-radius:14px;
  padding:14px 18px;
  background:var(--primary);
  color:white;
  font-size:17px;
  font-weight:700;
  cursor:pointer;
}
.btn:hover { background:var(--primary-dark); }
.btn.secondary { background:#eef2ff; color:#1e40af; }
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:10px;
  color:var(--muted);
  font-size:15px;
}
.progress {
  height:10px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
  margin:8px 0 18px;
}
.progress-inner {
  height:100%;
  background:var(--primary);
  width:0%;
  transition:width .25s ease;
}
.question-number { font-weight:800; color:#111827; }
.original-number {
  font-weight:900;
  color:#111827;
  margin-bottom:8px;
}
.question-stem {
  font-size:18px;
  font-weight:650;
  margin:14px 0 16px;
  white-space:pre-wrap;
}
.option {
  width:100%;
  text-align:left;
  padding:14px 14px;
  margin:10px 0;
  border:1px solid var(--border);
  border-radius:14px;
  background:#fff;
  color:var(--text);
  font-size:16px;
  line-height:1.65;
  white-space:pre-wrap;
  cursor:pointer;
}
.option:hover { border-color:#bfdbfe; background:#eff6ff; }
.option.disabled { cursor:not-allowed; }
.option.correct { border-color:#86efac; background:var(--success-bg); }
.option.wrong { border-color:#fecaca; background:var(--danger-bg); }
.feedback {
  display:none;
  margin-top:14px;
  padding:14px;
  border-radius:14px;
  font-weight:700;
}
.feedback.correct { display:block; background:var(--success-bg); color:var(--success); }
.feedback.wrong { display:block; background:var(--danger-bg); color:var(--danger); }
.result-title { font-size:26px; font-weight:900; margin:0 0 12px; }
.result-grid {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin:14px 0 18px;
}
.stat {
  background:#f8fafc;
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
  text-align:center;
}
.stat .num { font-size:24px; font-weight:900; }
.stat .label { color:var(--muted); font-size:14px; }
.wrong-card {
  border:1px solid var(--border);
  border-radius:16px;
  padding:15px;
  margin:12px 0;
  background:#fff;
}
.wrong-title {
  font-weight:900;
  margin-bottom:8px;
  color:var(--wrong-title);
  font-size:18px;
}
.wrong-stem { white-space:pre-wrap; font-weight:700; margin-bottom:12px; }
.wrong-options { white-space:pre-wrap; }
.answer-box {
  margin-top:14px;
  padding-top:12px;
  border-top:3px solid #ef4444;
}
.answer-line { margin-top:8px; font-weight:900; }
.answer-line.correct-answer { color:#111827; }
.hidden { display:none; }
.footer-note {
  margin-top:14px;
  font-size:13px;
  color:var(--muted);
  text-align:center;
}
@media (max-width:480px) {
  .container { padding:12px; }
  .card { padding:18px; border-radius:18px; }
  .home-title { font-size:21px; }
  .question-stem { font-size:17px; }
  .option { font-size:15.5px; padding:13px; }
  .result-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="container">

  <section id="home" class="card">
    <div class="home-title">115 年第二次 AI 應用規劃師-初級【機器學習】模擬題練習，共10題。</div>
    <div class="home-desc">每題作答後會立即顯示正確答案，完成後會統計分數、答對、答錯，並列出錯題內容。</div>
    <div class="meta">共 10 題｜單選題｜每題 10 分｜滿分 100 分</div>
    <button class="btn" onclick="startQuiz()">開始測驗</button>
    <div class="footer-note">答題後會立即顯示正確答案，最後統計分數與錯題。</div>
  </section>

  <section id="quiz" class="card hidden">
    <div class="topbar">
      <div><span class="question-number">第 <span id="currentNo">1</span> / 10 題</span></div>
      <div>目前作答：<span id="answeredCount">0</span> 題</div>
    </div>
    <div class="progress"><div id="progressInner" class="progress-inner"></div></div>
    <div id="originalNumber" class="original-number"></div>
    <div id="questionStem" class="question-stem"></div>
    <div id="options"></div>
    <div id="feedback" class="feedback"></div>
    <button id="nextBtn" class="btn hidden" onclick="nextQuestion()">下一題</button>
  </section>

  <section id="result" class="card hidden"></section>

</div>

<script>
const questions = [{"number": 1, "stem": "某行銷團隊希望將客戶依據購買習慣分成四個不具名的群組，且 目前沒有任何標籤資料。應採用何種機器學習方式？", "options": [{"label": "A", "text": "(A)監督式學習"}, {"label": "B", "text": "(B)非監督式學習"}, {"label": "C", "text": "(C)強化學習"}, {"label": "D", "text": "(D)半監督式學習"}], "answer": "B"}, {"number": 2, "stem": "在癌症篩檢任務中，若「漏掉任何一個病人」會造成嚴重後果， 研發團隊應優先提升哪項指標？", "options": [{"label": "A", "text": "(A)準確率"}, {"label": "B", "text": "(B)精確率"}, {"label": "C", "text": "(C)召回率"}, {"label": "D", "text": "(D)F1 分數"}], "answer": "C"}, {"number": 3, "stem": "下列哪種模型架構最適合用於自動提取監控影像中的車牌號碼？", "options": [{"label": "A", "text": "(A)CNN"}, {"label": "B", "text": "(B)RNN"}, {"label": "C", "text": "(C)LSTM"}, {"label": "D", "text": "(D)Autoencoder"}], "answer": "A"}, {"number": 4, "stem": "房價預測模型預測值為 1000 萬，實際成交價為 1100 萬，計算 兩者差距的指標通常為？", "options": [{"label": "A", "text": "(A)Recall"}, {"label": "B", "text": "(B)Precision"}, {"label": "C", "text": "(C)MSE"}, {"label": "D", "text": "(D)Accuracy"}], "answer": "C"}, {"number": 5, "stem": "關於深度學習的特性，下列何者正確？", "options": [{"label": "A", "text": "(A)必需仰賴手寫規則"}, {"label": "B", "text": "(B)能自動學習資料的抽象特徵"}, {"label": "C", "text": "(C)不適合處理非結構化資料"}, {"label": "D", "text": "(D)參數量 通常極少"}], "answer": "B"}, {"number": 6, "stem": "在深度神經網路中，Batch Normalization 主要解決的問題為何？", "options": [{"label": "A", "text": "(A)模型過度擬合"}, {"label": "B", "text": "(B)減少特徵數量"}, {"label": "C", "text": "(C)內部協變量偏移，提升梯度更新 穩定性"}, {"label": "D", "text": "(D)自動標註未標記資料"}], "answer": "C"}, {"number": 7, "stem": "關於 LIME 解釋技術的敘述，何者正確？", "options": [{"label": "A", "text": "(A)它是一種全局解釋 工具，說明模型整體的運作邏輯"}, {"label": "B", "text": "(B)它透過訓練一個代理模型來擬合目 標樣本附近的決策行為"}, {"label": "C", "text": "(C)它僅能用於解釋決策樹模型"}, {"label": "D", "text": "(D)它能直接修 改模型參數以降低偏誤"}], "answer": "B"}, {"number": 8, "stem": "強化學習中，若 AI 代理人持續嘗試新的行動以尋求更高的回 饋，這屬於哪種行為？", "options": [{"label": "A", "text": "(A)探索 (Exploration)"}, {"label": "B", "text": "(B)利用 (Exploitation)"}, {"label": "C", "text": "(C)正規化 (Regularization)"}, {"label": "D", "text": "(D)資料漂移"}], "answer": "A"}, {"number": 9, "stem": "若要分析特定特徵（如年齡）對模型預測結果的「整體影響傾 向」，最適合使用哪種 XAI 工具？", "options": [{"label": "A", "text": "(A)顯著性圖"}, {"label": "B", "text": "(B)LIME"}, {"label": "C", "text": "(C)SHAP"}, {"label": "D", "text": "(D) 部分依賴圖 (PDP)"}], "answer": "D"}, {"number": 10, "stem": "支援向量機 (SVM) 在何種資料情境下最具優勢？", "options": [{"label": "A", "text": "(A)超大規模 的影像資料庫"}, {"label": "B", "text": "(B)高維度且樣本數相對較少的小數據場景"}, {"label": "C", "text": "(C)即時不間 斷的串流資料"}, {"label": "D", "text": "(D)完全無標籤的聚類任務"}], "answer": "B"}];
let currentIndex = 0;
let userAnswers = Array(questions.length).fill(null);
let locked = false;

function show(id) {
  document.querySelectorAll("section").forEach(sec => sec.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function startQuiz() {
  currentIndex = 0;
  userAnswers = Array(questions.length).fill(null);
  locked = false;
  show("quiz");
  renderQuestion();
}

function renderQuestion() {
  locked = false;
  const q = questions[currentIndex];
  document.getElementById("currentNo").textContent = currentIndex + 1;
  document.getElementById("answeredCount").textContent = userAnswers.filter(x => x !== null).length;
  document.getElementById("progressInner").style.width = ((currentIndex + 1) / questions.length * 100) + "%";
  document.getElementById("originalNumber").textContent = "第 " + q.number + " 題";
  document.getElementById("questionStem").textContent = q.stem;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";
  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt.text;
    btn.onclick = () => chooseAnswer(opt.label);
    optionsDiv.appendChild(btn);
  });

  const feedback = document.getElementById("feedback");
  feedback.className = "feedback";
  feedback.textContent = "";
  document.getElementById("nextBtn").classList.add("hidden");
}

function chooseAnswer(label) {
  if (locked) return;
  locked = true;
  const q = questions[currentIndex];
  userAnswers[currentIndex] = label;

  const buttons = document.querySelectorAll(".option");
  buttons.forEach(btn => {
    btn.classList.add("disabled");
    const optionLabel = btn.textContent.trim().charAt(1);
    if (optionLabel === q.answer) btn.classList.add("correct");
    if (optionLabel === label && label !== q.answer) btn.classList.add("wrong");
  });

  const feedback = document.getElementById("feedback");
  if (label === q.answer) {
    feedback.className = "feedback correct";
    feedback.textContent = "✅ 答對！正確答案：" + getAnswerText(q);
  } else {
    feedback.className = "feedback wrong";
    feedback.textContent = "❌ 答錯！正確答案：" + getAnswerText(q);
  }

  const nextBtn = document.getElementById("nextBtn");
  nextBtn.textContent = currentIndex === questions.length - 1 ? "查看成績" : "下一題";
  nextBtn.classList.remove("hidden");
}

function nextQuestion() {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    showResult();
  }
}

function getAnswerText(q) {
  const found = q.options.find(o => o.label === q.answer);
  return found ? found.text : q.answer;
}

function getUserAnswerText(q, label) {
  if (!label) return "未作答";
  const found = q.options.find(o => o.label === label);
  return found ? found.text : label;
}

function showResult() {
  let correct = 0;
  const wrongs = [];
  questions.forEach((q, i) => {
    if (userAnswers[i] === q.answer) correct++;
    else wrongs.push({ q, userAnswer: userAnswers[i] });
  });

  const wrong = questions.length - correct;
  const score = correct * 10;

  let html = `
    <div class="result-title">測驗完成</div>
    <div class="result-grid">
      <div class="stat"><div class="num">${score}</div><div class="label">分數</div></div>
      <div class="stat"><div class="num">${correct}</div><div class="label">答對</div></div>
      <div class="stat"><div class="num">${wrong}</div><div class="label">答錯</div></div>
    </div>
  `;

  if (wrongs.length === 0) {
    html += `<p>🎉 全部答對，太厲害了！</p>`;
  } else {
    html += `<h3>錯題回顧</h3>`;
    wrongs.forEach(item => {
      const q = item.q;
      const optionsText = q.options.map(o => o.text).join("\n\n");
      html += `
        <div class="wrong-card">
          <div class="wrong-title">第 ${q.number} 題</div>
          <div class="wrong-stem">${escapeHtml(q.stem)}</div>
          <div class="wrong-options">${escapeHtml(optionsText)}</div>
          <div class="answer-box">
            <div class="answer-line">你的答案：${escapeHtml(getUserAnswerText(q, item.userAnswer))}</div>
            <div class="answer-line correct-answer">正確答案：${escapeHtml(getAnswerText(q))}</div>
          </div>
        </div>
      `;
    });
  }

  html += `<button class="btn secondary" onclick="startQuiz()">重新測驗</button>`;
  document.getElementById("result").innerHTML = html;
  show("result");
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
</script>
</body>
</html>
