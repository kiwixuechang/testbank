: "某設計團隊計畫在短時間內完成一款行動應用程式，必須同時達到高\n度個人化體驗、快速生成介面與行銷內容自動產出等需求。若結合 No\nCode/Low Code 平台與生成式AI 技術，以下哪一種整合策略最能符合\n目標？", "options": [{"label": "A", "text": "(A)使用生成式AI 自動產生API 呼叫與元件配置，並由開發者手動整\n合至No Code 平台流程；"}, {"label": "B", "text": "(B)透過生成式AI 在No Code 平台中自動建立介面模板，並結合使用\n者數據即時生成個人化功能與行銷推播內容；"}, {"label": "C", "text": "(C)在No Code 平台中導入生成式AI，快速建立跨專案可重用的通用模\n組，專注於提升開發速度；"}, {"label": "D", "text": "(D)在No Code 平台中完全依賴生成式AI 自動產生所有應用功能與流\n程，不經人工設計或驗證"}]}, {"number": 7, "answer": "C", "stem": "某團隊希望讓AI 自動查詢GitHub 上的程式碼庫，並生成摘要給使用\n者參考。開發者決定透過Model Context Protocol（MCP）來實現，AI\n需先發出請求，再經由MCP 架構逐步完成查詢與回傳。在此情境下，\nMCP 運作流程的正確順序為何？", "options": [{"label": "A", "text": "(A)MCP Server→AI Host→MCP Client→資料查詢→結果回傳AI\nHost；"}, {"label": "B", "text": "(B)MCP Client→AI Host→MCP Server→資料查詢→結果回傳AI\nHost；"}, {"label": "C", "text": "(C)AI Host→MCP Client→ MCP Server→資料查詢→結果回傳AI\nHost；"}, {"label": "D", "text": "(D)AI Host→MCP Server→MCP Client→資料查詢→結果回傳AI Host"}]}, {"number": 8, "answer": "C", "stem": "在Agent-to-Agent（A2A）架構中，不同代理人之間會分工合作。一般\n而言，下列敘述何者最符合Client Agent 與Remote Agent 的互動流\n程？", "options": [{"label": "A", "text": "(A)Remote Agent 主動分派任務給Client Agent；"}, {"label": "B", "text": "(B)由人工事先設定Client Agent 與Remote Agent 處理任務的先後順\n序；\n題    目"}, {"label": "C", "text": "(C)Client Agent 發起任務，Remote Agent 執行並回傳結果；"}, {"label": "D", "text": "(D)Client Agent 與Remote Agent 同時處理任務並同步處理結果"}]}, {"number": 9, "answer": "B", "stem": "在導入生成式AI 的應用規劃中，上下文工程（Context Engineering）\n的核心目的為何？", "options": [{"label": "A", "text": "(A)縮短模型訓練時間；"}, {"label": "B", "text": "(B)優化提示與上下文；"}, {"label": "C", "text": "(C)增加模型參數數量；"}, {"label": "D", "text": "(D)優化Fine-tuning 正確率"}]}, {"number": 10, "answer": "B", "stem": "某公司在導入生成式AI 協助撰寫內部報告時，測試人員刻意在輸入的\n上下文中放入互相矛盾的資訊（例如：同一位員工在不同段落被描述為\n「入職三年」與「入職五年」）。在這種情況下，最常見的模型行為會是\n什麼？", "options": [{"label": "A", "text": "(A)永遠選擇第一段資訊作為答案依據；"}, {"label": "B", "text": "(B)可能生成幻覺或隨機採信其中一方的內容；"}, {"label": "C", "text": "(C)拒絕回答，並要求提供更一致的輸入；"}, {"label": "D", "text": "(D)自動判斷並只選擇正確的資訊"}]}, {"number": 11, "answer": "A", "stem": "Agentic AI 在解決方案圖譜（Solution Graph）上尋找最佳解決路徑\n時，通常會使用什麼樣的搜尋策略？", "options": [{"label": "A", "text": "(A)使用廣度優先、深度優先或最佳優先等演算法進行探索；"}, {"label": "B", "text": "(B)每一步都隨機選擇動作，反覆嘗試直到找到一條可行路徑；"}, {"label": "C", "text": "(C)只執行事先假定的一條路徑，失敗就停止；"}, {"label": "D", "text": "(D)完全依靠LLM 一次性推斷最優完整路徑"}]}, {"number": 12, "answer": "C", "stem": "某企業考慮將開源大型語言模型（GPT-OSS）自行部署在本地伺服器，\n以取代雲端服務。下列何者最能代表本地部署對企業的實際好處？", "options": [{"label": "A", "text": "(A)可以達到無運算成本，因為本地部署模型不會產生額外的資源消\n耗；"}, {"label": "B", "text": "(B)模型的預測能力會比在雲端運行時更精度，因為本地環境更加可\n靠；"}, {"label": "C", "text": "(C)可確保輸入模型的敏感資料不會傳輸給第三方，提升資料隱私和自\n主控制；"}, {"label": "D", "text": "(D)以上皆是"}]}, {"number": 13, "answer": "D", "stem": "關於GitHub Copilot，下列敘述何者正確？", "options": [{"label": "A", "text": "(A)GitHub Copilot 基於程式碼片段查詢工具，透過後端搜尋大型程式\n碼資料庫提供建議；\n題    目"}, {"label": "B", "text": "(B)GitHub Copilot 僅適用於GitHub 上的開源專案，無法在私有程式\n碼庫或本地環境中提供程式碼補全建議；"}, {"label": "C", "text": "(C)GitHub Copilot 利用靜態分析技術分析程式碼，根據邏輯流程推導\n下一步應寫的程式碼；"}, {"label": "D", "text": "(D)GitHub Copilot 由OpenAI 的Codex 模型提供技術支援，可即時在\n開發者編輯程式碼時給出整行或整個函式建議"}]}, {"number": 14, "answer": "B", "stem": "某電商公司導入Agentic AI 來處理客服工作。測試發現Agent 在回答\n產品FAQ 時經常出錯，且無法幫客戶修改訂單。這種情況最可能是因\n為缺少下列哪兩項工具或技術？", "options": [{"label": "A", "text": "(A)API 調用（API Calling）＋ 任務規劃器（Task Planner）；"}, {"label": "B", "text": "(B)向量資料庫檢索（Vector Retrieval）＋API 調用（API Calling）；"}, {"label": "C", "text": "(C)向量資料庫檢索（Vector Retrieval）＋任務規劃器（Task\nPlanner）；"}, {"label": "D", "text": "(D)任務規劃器（Task Planner）＋溫度參數（Temperature）設定"}]}, {"number": 15, "answer": "B", "stem": "某客服自動回應系統希望根據不同客戶群體調整回覆風格。在兼顧即\n時性與效果的前提下，下列哪一種方案最適合？", "options": [{"label": "A", "text": "(A)直接微調預訓練模型針對每個客戶群體分別訓練不同風格模型；"}, {"label": "B", "text": "(B)利用控制變量（Control Tokens）或風格標籤在同一模型內動態調\n整風格；"}, {"label": "C", "text": "(C)利用生成對抗網路（GAN）生成不同風格文本，並透過人工篩選最終\n答案；"}, {"label": "D", "text": "(D)採用規則式替換方法，替換回覆詞彙以符合不同風格要求。"}]}, {"number": 16, "answer": "D", "stem": "在建置多代理大型語言模型（Multi-agent LLMs）系統時，如果沒有清\n楚定義每個代理的任務啟動條件和角色分工，最可能出現什麼問題？", "options": [{"label": "A", "text": "(A)回覆內容前後不連貫，系統邏輯斷裂；"}, {"label": "B", "text": "(B)不同代理的答案互相衝突，無法判斷最終決策；"}, {"label": "C", "text": "(C)系統陷入無限對話循環，導致資源耗盡；"}, {"label": "D", "text": "(D)多個代理重複做同樣的任務，造成效率低落"}]}, {"number": 17, "answer": "D", "stem": "某公司部署結合 Fine-tuning 與檢索增強生成（RAG）的語言模型系統\n作為內部文件助理。系統需同時確保回覆語氣一致、能即時查詢每日新\n增文件、維持效能穩定，並避免頻繁重新訓練。在長期維護與效能平衡\n下，下列哪一種策略最合適？", "options": [{"label": "A", "text": "(A)每週重新Fine-tune 模型，將新文件整合進模型知識，逐步取代RAG\n模組；\n題    目"}, {"label": "B", "text": "(B)完全依靠基礎模型與RAG，不進行Fine-tune，僅透過提示設計控\n制語氣；"}, {"label": "C", "text": "(C)每日進行增量Fine-tune，讓模型即時學習新文件內容，避免依賴\n檢索；"}, {"label": "D", "text": "(D)保留語氣相關Fine-tuning，僅透過檢索系統更新文件內容，不頻\n繁改動模型"}]}, {"number": 18, "answer": "D", "stem": "某客服系統在回覆「訂單取消政策」時，即使生成溫度固定為 0.6，回\n覆品質仍常出現差異。調查顯示，檢索到的政策內容有時是最新版本，\n有時則是過時文件，此外Prompt 約束不足，微調語料也有模糊描述。\n若要優先改善品質波動，應先解決下列哪一項問題？", "options": [{"label": "A", "text": "(A)調整溫度參數，降低生成隨機性；"}, {"label": "B", "text": "(B)加強Prompt 設計，限制模型表達方式；"}, {"label": "C", "text": "(C)優化微調語料，減少含糊描述；"}, {"label": "D", "text": "(D)提升檢索系統品質，確保取得的政策內容正確且最新"}]}, {"number": 19, "answer": "B", "stem": "某醫院導入了一套智慧系統，由三個模組構成：語音辨識（ASR） → 語\n言模型生成（LLM） → 查詢醫療資料庫 API。近期發現部分查詢結果\n錯誤，例如醫師詢問「術後復健流程」時，系統卻誤判為要查詢「術前\n注意事項」，因此查詢到錯誤的文件。經檢查已排除語音辨識的錯誤，\n下列何者最可能是造成查詢錯誤的來源？", "options": [{"label": "A", "text": "(A)醫療資料庫API 對應規則設計不清，造成意圖映射模糊；"}, {"label": "B", "text": "(B)LLM 的Prompt 缺乏明確指示，導致語意分類判斷錯誤；"}, {"label": "C", "text": "(C)查詢API 回傳速度過慢，影響系統處理正確性；"}, {"label": "D", "text": "(D)LLM 未經醫療領域微調，難以正確理解專業性詞彙"}]}, {"number": 20, "answer": "D", "stem": "某醫院正在規劃一個AI 專案，目的是協助醫師從胸腔X 光影像中判斷\n是否存在肺炎徵兆，團隊卻誤將生成式 AI 模型運用於影像診斷。下列\n哪一項最可能成為主要風險？", "options": [{"label": "A", "text": "(A)模型在生成報告時語句流暢，但僅在文字表達上有差異，對診斷結\n果沒有重大影響；"}, {"label": "B", "text": "(B)模型若資料不足，僅會降低生成報告的完整性，而非影響判斷病灶\n的正確性；"}, {"label": "C", "text": "(C)模型偏向生成內容而非分類，但此差異僅影響效率，不會造成誤診\n風險；"}, {"label": "D", "text": "(D)模型可能生成與實際影像不符的診斷結論，導致誤判並引發醫療與\n法律風險\n題    目"}]}, {"number": 21, "answer": "A", "stem": "某公司開發的智慧車載語音助理，可透過語音辨識（ASR）辨識駕駛語\n音，再由LLM 生成回答並查詢車載 API。測試中發現：ASR 對汽車專\n業術語辨識錯誤率高；LLM 的回覆常不精確；系統回覆延遲雖存在但仍\n可接受。若目標是「優先提升準確性與回答品質」，下列改進步驟的最\n合理執行順序為何？\n1. 擴充並標註汽車領域語音資料，微調 ASR 模型\n2. 微調 LLM 並加入檢索增強（RAG）\n3. 優化系統架構，引入批次推論降低延遲\n4. 動態調整生成溫度，平衡準確度與多樣性", "options": [{"label": "A", "text": "(A)1 → 2 → 4 → 3；"}, {"label": "B", "text": "(B)2 → 1→ 3 → 4；"}, {"label": "C", "text": "(C)1 → 3 → 2 → 4；"}, {"label": "D", "text": "(D)3 → 1 → 2 → 4"}]}, {"number": 22, "answer": "C", "stem": "一家顧問公司使用生成式AI 協助撰寫數據分析報告。雖然模型在測試\n中表現優異，但其生成的報告多半僅遵循固定段落結構，替換數值或關\n鍵詞即可完成，卻未能展現針對不同專案的多樣化推理與分析。下列何\n者為造成這種現象的最合理解釋？", "options": [{"label": "A", "text": "(A)模型在生成過程中缺乏對字體與排版的優化能力，因此無法展現分\n析邏輯；"}, {"label": "B", "text": "(B)測試資料涵蓋過多統計圖表，導致模型無法專注於文字內容的多樣\n化表達；"}, {"label": "C", "text": "(C)模型過度依賴訓練語料中的常見報告範式，導致生成結果以樣板化\n結構取代真正的推理；"}, {"label": "D", "text": "(D)模型因無法正確辨識報告中的頁碼與標題層級，才出現樣板化的結\n果"}]}, {"number": 23, "answer": "D", "stem": "在應用零樣本提示（Zero-Shot Prompting）時，下列哪一種情境最可\n能因缺乏示範而失敗，出現語意錯誤或結構錯誤的輸出？", "options": [{"label": "A", "text": "(A)要求模型判斷一段影評文字的情感傾向；"}, {"label": "B", "text": "(B)要求模型將一段新聞摘要濃縮為一句話；"}, {"label": "C", "text": "(C)要求模型將一段繁體中文翻譯成英文；"}, {"label": "D", "text": "(D)要求模型從表格中擷取所有城市的最高氣溫"}]}, {"number": 24, "answer": "D", "stem": "某保險公司計畫導入生成式AI 的內部合約查詢系統，協助業務員與法\n務部門快速解讀保單條款與理賠規範。高層特別強調客戶資料隱私與\n合規風險控管，即使需要投入較多資源，也必須確保資料不會外洩。在\n題    目\n此情況下，下列哪一種策略最符合公司的資料安全與合規優先考量？", "options": [{"label": "A", "text": "(A)導入開源模型並由IT 團隊自建，後續再逐步補強隱私與合規控管；"}, {"label": "B", "text": "(B)在需求確認階段即納入法遵與稽核單位，設定準確率KPI，並透過\nMVP 驗證成效；"}, {"label": "C", "text": "(C)優先使用雲端大型API 模型快速部署，並根據使用數據持續調整；"}, {"label": "D", "text": "(D)投入資源自訓並私有化部署LLM，並同步建立自動化風控機制"}]}, {"number": 25, "answer": "B", "stem": "某新創公司開發一套圖像描述生成系統，能根據輸入的照片自動產生\n說明文字。為了讓產生的描述文字能與圖片資訊精準對應，下列哪一種\n設計思路最關鍵？", "options": [{"label": "A", "text": "(A)強化語言模型的句法與流暢性，確保生成文字更自然易讀；"}, {"label": "B", "text": "(B)在生成過程中結合圖片特徵與語言建模，讓模型同時利用影像內容\n與文字資訊；"}, {"label": "C", "text": "(C)調整生成策略（如 Beam Search 或溫度參數），以提升輸出文字的\n合理性；"}, {"label": "D", "text": "( }, {"number": 41, "answer": "A", "stem": "在少樣本提示（Few-shot Prompting）僅能提供 1–2 個範例的情況\n下，若遇到領域偏移（Domain Shift），下列何者為模型最可能面臨的\n核心挑戰？", "options": [{"label": "A", "text": "(A)範例數量過少，無法涵蓋新領域的多樣性，導致模型泛化不足；"}, {"label": "B", "text": "(B)範例表徵有限，模型容易依賴單一樣本特性而降低適應力；"}, {"label": "C", "text": "(C)範例覆蓋不足，使模型難以抽取跨領域的穩定模式；"}, {"label": "D", "text": "(D)範例資訊過於稀缺，模型缺乏應對不同輸入情境的能力"}]}, {"number": 42, "answer": "A", "stem": "某金融機構導入檢索增強生成（Retrieval-Augmented Generation,\nRAG）模型，用於客服文件查詢與自動回覆。由於大型模型運算成本過\n高，若考慮引入知識蒸餾（Knowledge Distillation, KD）技術，下列\n何者為帶來的主要效益？", "options": [{"label": "A", "text": "(A)讓小型模型學習大型模型的知識，在降低運算成本的同時維持檢索\n與生成品質；"}, {"label": "B", "text": "(B)只能應用於語音或影像辨識，無法提升文字檢索生成效能；"}, {"label": "C", "text": "(C)因為RAG 已有檢索機制，因此無需額外蒸餾知識；"}, {"label": "D", "text": "(D)僅能依賴特定 API 供應商才能使用，無法在自建模型中實現"}]}, {"number": 43, "answer": "D", "stem": "在評估大型語言模型，例如7B、13B、175B 參數規模時，模型規模對基\n準測試（Benchmark）結果的影響，下列哪一種說法最為恰當？", "options": [{"label": "A", "text": "(A)小模型在正確調整下能超越大模型，因此模型大小並不重要；\n題    目"}, {"label": "B", "text": "(B)大模型在多數情境下表現較好，但在特定任務上略遜於小模型；"}, {"label": "C", "text": "(C)模型規模與基準測試結果完全無關，影響主要來自測試設計；"}, {"label": "D", "text": "(D)模型越大，Benchmark 結果可能提升，但幅度取決於訓練數據品質\n與資源配置"}]}, {"number": 44, "answer": "C", "stem": "在AI 應用設計中，Model Context Protocol（MCP）與檢索增強生成\n（RAG）都能擴展模型的能力，但兩者的核心差異主要為下列何者？", "options": [{"label": "A", "text": "(A)MCP 擴展模型工具，但主要用於補足訓練資料不足；"}, {"label": "B", "text": "(B)MCP 能標準化連接資源，但仍需依賴向量資料庫；"}, {"label": "C", "text": "(C)RAG 常用於擴展知識庫內容，而MCP 更著重於動態工具與API 呼叫\n的整合；"}, {"label": "D", "text": "(D)RAG 透過統一協議，提升回答相關性"}]}, {"number": 45, "answer": "A", "stem": "下列哪一個資料集專門設計用於測試大型語言模型在多領域、多任務\n語言理解中，涵蓋人文、科學與社會科學等領域，而非專門用於數學推\n理或中文專業知識？", "options": [{"label": "A", "text": "(A)MMLU；"}, {"label": "B", "text": "(B)GSM8K；"}, {"label": "C", "text": "(C)MATH；"}, {"label": "D", "text": "(D)C-Eval"}]}, {"number": 46, "answer": "D", "stem": "某智慧工廠導入生成式AI，協助產線工程師即時產生維修指引與操作\n建議。下列哪一項並非團隊在系統設計中加入Guardrails（防護機制）\n的主要目的？", "options": [{"label": "A", "text": "(A)檢查工程師輸入內容，避免觸發錯誤或危險需求；"}, {"label": "B", "text": "(B)過濾與驗證AI 輸出的維修指引，確保符合安全標準；"}, {"label": "C", "text": "(C)確保生成的操作建議符合法規與產業安全規範；"}, {"label": "D", "text": "(D)完整重建並追蹤 AI 模型的全部推理過程"}]}, {"number": 47, "answer": "B", "stem": "某顧問公司導入生成式AI，協助團隊快速檢索並摘要長篇的法規文件。\n為了改善檢索結果常出現不相關或過於分散內容的問題，下列何者為\n團隊決定對文件進行文本切分（Chunking）的主要目的？", "options": [{"label": "A", "text": "(A)讓模型在回答時能加快推理速度；"}, {"label": "B", "text": "(B)提高檢索相關性與降低長上下文噪音；"}, {"label": "C", "text": "(C)降低系統記憶體和硬體資源的負擔；"}, {"label": "D", "text": "(D)使模型在生成回覆時更具創造性與多樣化"}]}, {"number": 48, "answer": "A", "stem": "某開發團隊在建置企業內部知識檢索系統時，選擇採用多向量檢索器\n（Multi-vector Retriever），下列何者為協助提升系統查詢的完整性\n題    目\n與精準度的主要方式？", "options": [{"label": "A", "text": "(A)支援同時處理多種資訊表示，提升跨文本型態的檢索效果；"}, {"label": "B", "text": "(B)透過多向量壓縮與共享權重方式，降低檢索過程的運算與儲存成\n本；"}, {"label": "C", "text": "(C)以切分並過濾文件片段，減少上下文長度帶來的Token 負擔；"}, {"label": "D", "text": "(D)透過調整生成階段的溫度參數，使模型在回覆時更穩定一致"}]}, {"number": 49, "answer": "D", "stem": "在Agentic AI 的架構中，解決方案圖譜（Solution Graph）常被用來\n輔助代理的任務執行，其主要作用為何？", "options": [{"label": "A", "text": "(A)透過圖形結構完全取代大型語言模型的推理，讓代理只依靠圖演算\n法完成任務；"}, {"label": "B", "text": "(B)僅用於保存代理的輸出結果，方便後續檢視與審計，而不影響實際\n推理流程；"}, {"label": "C", "text": "(C)將代理限制在既定流程內，避免其產生偏離設計腳本的行為；"}, {"label": "D", "text": "(D)作為代理在執行過程中的參考框架，用於組織決策步驟並支援任務\n推理"}]}, {"number": 50, "answer": "C", "stem": "小明想開發一個部落格寫作工具，讓用戶輸入文章開頭後，系統自動幫\n忙寫出後續內容，例如輸入「今天去了台北木柵動物園...」，系統就能\n續寫。若要實現這樣的功能，最適合選擇下列哪一類任務？", "options": [{"label": "A", "text": "(A)序列到序列建模（Sequence-to-Sequence Modeling），透過輸入序\n列產生新的輸出序列；"}, {"label": "B", "text": "(B)遮罩語言建模（Masked Language Modeling），補齊文字中缺失的\n詞語或片段；"}, {"label": "C", "text": "(C)生成式語言建模（Text Generation），依據上下文持續產生新的內\n容；"}, {"label": "D", "text": "(D)文本分類（Text Classification），針對輸入文本判斷情感、主題\n或標籤\n《以下空白》"}]}];
let currentIndex = 0;
let userAnswers = Array(questions.length).fill(null);
let locked = false;

function show(id) {
  document.querySelectorAll("section").forEach(sec => sec.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function startQuiz() {
  currentIndex = 0;
  userAnswers = Array(questions.length).fill(null);
  locked = false;
  show("quiz");
  renderQuestion();
}

function renderQuestion() {
  locked = false;
  const q = questions[currentIndex];
  document.getElementById("currentNo").textContent = currentIndex + 1;
  document.getElementById("answeredCount").textContent = userAnswers.filter(x => x !== null).length;
  document.getElementById("progressInner").style.width = ((currentIndex + 1) / questions.length * 100) + "%";
  document.getElementById("questionStem").textContent = q.stem;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";
  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt.text;
    btn.onclick = () => chooseAnswer(opt.label);
    optionsDiv.appendChild(btn);
  });

  const feedback = document.getElementById("feedback");
  feedback.className = "feedback";
  feedback.textContent = "";
  document.getElementById("nextBtn").classList.add("hidden");
}

function chooseAnswer(label) {
  if (locked) return;
  locked = true;
  const q = questions[currentIndex];
  userAnswers[currentIndex] = label;

  const buttons = document.querySelectorAll(".option");
  buttons.forEach(btn => {
    btn.classList.add("disabled");
    const optionLabel = btn.textContent.trim().charAt(1);
    if (optionLabel === q.answer) btn.classList.add("correct");
    if (optionLabel === label && label !== q.answer) btn.classList.add("wrong");
  });

  const feedback = document.getElementById("feedback");
  if (label === q.answer) {
    feedback.className = "feedback correct";
    feedback.textContent = "✅ 答對！正確答案：" + getAnswerText(q);
  } else {
    feedback.className = "feedback wrong";
    feedback.textContent = "❌ 答錯！正確答案：" + getAnswerText(q);
  }

  const nextBtn = document.getElementById("nextBtn");
  nextBtn.textContent = currentIndex === questions.length - 1 ? "查看成績" : "下一題";
  nextBtn.classList.remove("hidden");
}

function nextQuestion() {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    showResult();
  }
}

function getAnswerText(q) {
  const found = q.options.find(o => o.label === q.answer);
  return found ? found.text : q.answer;
}

function getUserAnswerText(q, label) {
  if (!label) return "未作答";
  const found = q.options.find(o => o.label === label);
  return found ? found.text : label;
}

function showResult() {
  let correct = 0;
  const wrongs = [];
  questions.forEach((q, i) => {
    if (userAnswers[i] === q.answer) correct++;
    else wrongs.push({ q, userAnswer: userAnswers[i] });
  });

  const wrong = questions.length - correct;
  const score = correct * 2;

  let html = `
    <div class="result-title">測驗完成</div>
    <div class="result-grid">
      <div class="stat"><div class="num">${score}</div><div class="label">分數</div></div>
      <div class="stat"><div class="num">${correct}</div><div class="label">答對</div></div>
      <div class="stat"><div class="num">${wrong}</div><div class="label">答錯</div></div>
    </div>
  `;

  if (wrongs.length === 0) {
    html += `<p>🎉 全部答對，太厲害了！</p>`;
  } else {
    html += `<h3>錯題回顧</h3>`;
    wrongs.forEach(item => {
      const q = item.q;
      const optionsText = q.options.map(o => o.text).join("\n\n");
      html += `
        <div class="wrong-card">
          <div class="wrong-title">第 ${q.number} 題</div>
          <div class="wrong-stem">${escapeHtml(q.stem)}</div>
          <div class="wrong-options">${escapeHtml(optionsText)}</div>
          <div class="answer-box">
            <div class="answer-line">你的答案：${escapeHtml(getUserAnswerText(q, item.userAnswer))}</div>
            <div class="answer-line correct-answer">正確答案：${escapeHtml(getAnswerText(q))}</div>
          </div>
        </div>
      `;
    });
  }

  html += `<button class="btn secondary" onclick="startQuiz()">重新測驗</button>`;
  document.getElementById("result").innerHTML = html;
  show("result");
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
</script>
</body>
</html>
